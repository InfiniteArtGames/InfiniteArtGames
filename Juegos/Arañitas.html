<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Arañitas Multicolor 3.1.9 (Dash Mejorado)</title>
    <style>
        html, body { height: 100%; width: 100%; margin: 0; overflow: hidden; background-color: #111; color: white; font-family: 'Courier New', Courier, monospace; }
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #gameWrapper { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; }
        #gameContainer { position: relative; width: 100%; max-width: 1280px; max-height: calc(100vh - 60px); aspect-ratio: 16 / 9; }
        canvas { width: 100%; height: 100%; border: 2px solid #555; background-color: #000; cursor: pointer; display: block; }
        #controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #analogStick { position: absolute; display: none; width: 150px; height: 150px; background-color: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; pointer-events: all; justify-content: center; align-items: center; transform: translate(-50%, -50%); }
        #stickKnob { width: 60px; height: 60px; background-color: rgba(100, 200, 255, 0.7); border: 2px solid #fff; border-radius: 50%; }
        #gameInfo { width: 100%; max-width: 1280px; margin-top: 5px; font-size: clamp(12px, 2.5vw, 20px); text-align: center; display: flex; justify-content: space-around; align-items: center; }
        #bossHealthContainer { position: absolute; top: 10px; left: 10%; width: 80%; background-color: #333; border: 2px solid #555; display: none; }
        #bossHealthBar { width: 100%; height: 20px; background-color: #8B0000; transition: width 0.2s; }
        .info-box { display: flex; flex-direction: column; align-items: center; }
        .info-label { font-size: 0.7em; color: #aaa; }
        #dashIndicator { width: 24px; height: 24px; border-radius: 50%; background-color: #222; border: 2px solid #555; position: relative; box-sizing: border-box; }
        #dashIndicator.ready { border-color: #00FFFF; box-shadow: 0 0 8px #00FFFF; }
        #dashIndicatorProgress { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#555 0deg, transparent 0deg); }
        @media (pointer: coarse) { #controls { display: block; } }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <div id="gameContainer">
            <canvas id="gameCanvas" width="1280" height="720"></canvas>
            <div id="bossHealthContainer"><div id="bossHealthBar"></div></div>
            <div id="controls"><div id="analogStick"><div id="stickKnob"></div></div></div>
        </div>
        <div id="gameInfo">
            <div class="info-box"> <span class="info-label">Puntuación</span> <span id="score">0</span> </div>
            <div class="info-box"> <span class="info-label">Vidas</span> <span id="lives">3</span> </div>
            <div class="info-box"> <span class="info-label">Nivel Nave</span> <span id="shipLevel" style="color:gold;">1</span> </div>
            <div class="info-box"> <span class="info-label">Dash</span> <div id="dashIndicator"><div id="dashIndicatorProgress"></div></div> </div>
            <div class="info-box"> <span class="info-label">Ola</span> <span id="wave">1</span> </div>
            <div class="info-box"> <span class="info-label">Combo</span> <span id="combo" style="color:gold;">x1</span> </div>
            <div id="powerUpTimer" style="color:gold; display:none; flex-direction: column; align-items: center;"> <span class="info-label">Triple Disparo</span> <span id="timerValue">15s</span> </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE AUDIO ---
        let audioContext;
        function initAudio() { if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)(); }
        function playShootSound() { if (!audioContext) return; const osc = audioContext.createOscillator(); const gain = audioContext.createGain(); osc.connect(gain); gain.connect(audioContext.destination); osc.type = 'square'; osc.frequency.setValueAtTime(800, audioContext.currentTime); osc.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.1); gain.gain.setValueAtTime(0.2, audioContext.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1); osc.start(); osc.stop(audioContext.currentTime + 0.1); }
        function playExplosionSound() { if (!audioContext) return; const noise = audioContext.createBufferSource(); const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.5, audioContext.sampleRate); const data = buffer.getChannelData(0); for (let i = 0; i < data.length; i++) { data[i] = Math.random() * 2 - 1; } noise.buffer = buffer; const gain = audioContext.createGain(); gain.gain.setValueAtTime(0.5, audioContext.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4); noise.connect(gain); gain.connect(audioContext.destination); noise.start(); noise.stop(audioContext.currentTime + 0.5); }
        function playPowerUpSound() { if (!audioContext) return; const osc = audioContext.createOscillator(); const gain = audioContext.createGain(); osc.connect(gain); gain.connect(audioContext.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioContext.currentTime); osc.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); osc.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); gain.gain.setValueAtTime(0.3, audioContext.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4); osc.start(); osc.stop(audioContext.currentTime + 0.4); }
        function playHitSound() { if (!audioContext) return; const osc = audioContext.createOscillator(); const gain = audioContext.createGain(); osc.connect(gain); gain.connect(audioContext.destination); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioContext.currentTime); gain.gain.setValueAtTime(0.4, audioContext.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2); osc.start(); osc.stop(audioContext.currentTime + 0.2); }
        function playWebTrapSound() { if (!audioContext) return; const osc = audioContext.createOscillator(); const gain = audioContext.createGain(); osc.connect(gain); gain.connect(audioContext.destination); osc.type = 'triangle'; osc.frequency.setValueAtTime(200, audioContext.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.3); gain.gain.setValueAtTime(0.3, audioContext.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3); osc.start(); osc.stop(audioContext.currentTime + 0.3); }
        function playLevelUpSound() { if(!audioContext) return; const osc1 = audioContext.createOscillator(); const osc2 = audioContext.createOscillator(); const gain = audioContext.createGain(); osc1.connect(gain); osc2.connect(gain); gain.connect(audioContext.destination); osc1.type = 'sawtooth'; osc2.type = 'sawtooth'; gain.gain.setValueAtTime(0.0, audioContext.currentTime); gain.gain.linearRampToValueAtTime(0.4, audioContext.currentTime + 0.05); gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.0); osc1.frequency.setValueAtTime(200, audioContext.currentTime); osc1.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 1.0); osc2.frequency.setValueAtTime(100, audioContext.currentTime); osc2.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 1.0); osc1.start(); osc2.start(); osc1.stop(audioContext.currentTime + 1.0); osc2.stop(audioContext.currentTime + 1.0); }
        function playDashSound() { if (!audioContext) return; const noise = audioContext.createBufferSource(); const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.3, audioContext.sampleRate); const data = buffer.getChannelData(0); for (let i = 0; i < data.length; i++) { data[i] = Math.random() * 2 - 1; } noise.buffer = buffer; const biquadFilter = audioContext.createBiquadFilter(); biquadFilter.type = "lowpass"; biquadFilter.frequency.setValueAtTime(4000, audioContext.currentTime); biquadFilter.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.2); const gain = audioContext.createGain(); gain.gain.setValueAtTime(0.4, audioContext.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3); noise.connect(biquadFilter); biquadFilter.connect(gain); gain.connect(audioContext.destination); noise.start(); noise.stop(audioContext.currentTime + 0.3); }
        
        const gameContainer = document.getElementById('gameContainer');
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score'); const livesDisplay = document.getElementById('lives');
        const waveDisplay = document.getElementById('wave'); const comboDisplay = document.getElementById('combo');
        const shipLevelDisplay = document.getElementById('shipLevel');
        const dashIndicator = document.getElementById('dashIndicator');
        const dashIndicatorProgress = document.getElementById('dashIndicatorProgress');
        const powerUpTimerDisplay = document.getElementById('powerUpTimer'); const timerValueDisplay = document.getElementById('timerValue');
        const bossHealthContainer = document.getElementById('bossHealthContainer'); const bossHealthBar = document.getElementById('bossHealthBar');
        const ANCHO_VENTANA = canvas.width; const ALTO_VENTANA = canvas.height;

        const GameState = { START_SCREEN: 'START_SCREEN', MENU: 'MENU', SHIP_SELECTION: 'SHIP_SELECTION', PLAYING: 'PLAYING', WARP_TRANSITION: 'WARP_TRANSITION', GAME_OVER: 'GAME_OVER', OPTIONS: 'OPTIONS', CREATOR: 'CREATOR', PAUSED: 'PAUSED' };
        let currentState = GameState.START_SCREEN;
        let previousState = null;

        const NEGRO = '#000000'; const BLANCO = '#FFFFFF'; const AZUL = '#3296FA'; const NARANJA = '#FFA500'; const VERDE = '#32FF32'; const ROJO = '#FF3232'; const ROJO_OSCURO = '#8B0000'; const AMARILLO = '#FFFF32'; const MORADO = '#C832FF'; const CIAN = '#32FFFF'; const GRIS = '#AAAAAA'; const COLOR_PROYECTIL_ENEMIGO = '#FF00FF'; const ORO = '#FFD700'; const COLOR_CORAZON = '#FF1493'; const NEON_MAGENTA = '#FF00FF'; const NEON_CYAN = '#00FFFF';
        const COLORES_ARANIA = [ROJO, AMARILLO, MORADO, CIAN, VERDE];

        const temasDeFondo = [ { nombre: 'Espacio Profundo', color1: '#000000', color2: '#000000' }, { nombre: 'Anochecer Purpura', color1: '#2c1a42', color2: '#0b0215' }, { nombre: 'Atardecer Cosmico', color1: '#3c1053', color2: '#ad5389' }, { nombre: 'Nebulosa Roja', color1: '#480f29', color2: '#090105' }, { nombre: 'Galaxia Cian', color1: '#013a57', color2: '#00070a' }, ];

        let jugador; let rafagasDisparo = []; let aranas = []; let balas = []; let telarañas = []; let powerUps = []; let stars = []; let particles = [];
        let redesTrampa = []; let textosFlotantes = []; let elementosFondo = []; let escombros = []; let asteroides = []; let satelites = []; let meteoritos = []; let explosiones = [];
        let afterImages = [];
        // --- MODIFICACIÓN: Se declara la variable para el nuevo sistema de polvo estelar ---
        let sistemaPolvoEstelar;

        let puntuacion = 0; let vidas = 3;
        let jugando = false; let animacionId; let ultimoDisparo = 0; let powerUpActive = false; let powerUpEndTime = 0;
        let invincibleEndTime = 0; let currentWave = 1; let enemiesToSpawn = []; let spawnTimer = 0; let waveTransitioning = false;
        let lastKillTime = 0; let comboCounter = 1; const COMBO_TIMEOUT = 2000;
        let screenShakeEndTime = 0; let screenShakeIntensity = 0; let shieldActive = false; let shieldEndTime = 0;
        let staticEffectEndTime = 0; let isWarping = false; let screenFlash = 0;
        const keysPressed = {}; let lastKeyUp = {key: '', time: 0}; const DOUBLE_TAP_TIME = 250;
        let firing = false; let mousePos = { x: 0, y: 0 }; let basuraEspacialTimer = 300;
        const umbralesDePuntuacion = [1000, 2500, 5000, 9000, 15000, 25000, 40000, 60000, 90000];
        const MAX_LEVEL = 10;
        let dificultad = 'normal'; let settingsActuales;
        let modoControlTactil = 'botones';
        let lastGamepadState = { y: 0, rightStick: {x: 0, y: 0}, buttons:[] }; let botonSeleccionadoIndex = 0;
        let tipoNaveElegida = 'Interceptor';
        let zonaActual = { tipo: 'Espacio Profundo', tema: temasDeFondo[0] };

        const statsNaves = {
            Interceptor: { velocidad: 7, vidasMax: 3, cadenciaBase: 220, color: AZUL, bulletDamage: 1 },
            Tanque:      { velocidad: 4.5, vidasMax: 5, cadenciaBase: 300, color: NARANJA, bulletDamage: 2 }
        };

        const settingsDificultad = {
            facil: { saludTanque: 2, saludJefe: 75, modEnemigos: 0.8, probPeligrosos: 0.3 },
            normal: { saludTanque: 3, saludJefe: 100, modEnemigos: 1.0, probPeligrosos: 0.5 },
            dificil: { saludTanque: 5, saludJefe: 150, modEnemigos: 1.2, probPeligrosos: 0.7 }
        };
        settingsActuales = settingsDificultad[dificultad];

        const partesNave = {
            Interceptor: {
                chasis: [
                    { tier: 1, draw: (ctx, x, y, w, h, color) => {
                        ctx.fillStyle = color;
                        ctx.beginPath(); ctx.moveTo(x + w * 0.5, y); ctx.lineTo(x + w, y + h * 0.8); ctx.lineTo(x + w * 0.5, y + h); ctx.lineTo(x, y + h * 0.8); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = CIAN; // Cockpit
                        ctx.beginPath(); ctx.moveTo(x + w * 0.5, y + h * 0.2); ctx.lineTo(x + w * 0.6, y + h * 0.4); ctx.lineTo(x + w * 0.5, y + h * 0.6); ctx.lineTo(x + w * 0.4, y + h * 0.4); ctx.closePath(); ctx.fill();
                    }},
                    { tier: 2, draw: (ctx, x, y, w, h, color) => { // Chasis T2
                        ctx.fillStyle = color;
                        ctx.beginPath(); ctx.moveTo(x + w * 0.5, y); ctx.lineTo(x + w * 1.1, y + h * 0.85); ctx.lineTo(x + w * 0.5, y + h); ctx.lineTo(x - w * 0.1, y + h * 0.85); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = CIAN; // Cockpit
                        ctx.beginPath(); ctx.moveTo(x + w * 0.5, y + h * 0.1); ctx.lineTo(x + w * 0.7, y + h * 0.4); ctx.lineTo(x + w * 0.5, y + h * 0.7); ctx.lineTo(x + w * 0.3, y + h * 0.4); ctx.closePath(); ctx.fill();
                    }},
                     { tier: 3, draw: (ctx, x, y, w, h, color) => { // Chasis T3
                        ctx.fillStyle = GRIS;
                        ctx.beginPath(); ctx.moveTo(x + w * 0.5, y); ctx.lineTo(x + w * 1.2, y + h * 0.9); ctx.lineTo(x + w * 0.5, y + h); ctx.lineTo(x - w * 0.2, y + h * 0.9); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = color;
                        ctx.beginPath(); ctx.moveTo(x + w * 0.5, y + h*0.1); ctx.lineTo(x + w * 0.9, y + h * 0.8); ctx.lineTo(x + w * 0.5, y + h*0.9); ctx.lineTo(x + w * 0.1, y + h * 0.8); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = ROJO; // Cockpit
                        ctx.beginPath(); ctx.moveTo(x + w * 0.5, y + h * 0.2); ctx.lineTo(x + w * 0.65, y + h * 0.4); ctx.lineTo(x + w * 0.5, y + h * 0.6); ctx.lineTo(x + w * 0.35, y + h * 0.4); ctx.closePath(); ctx.fill();
                    }}
                ],
                alas: [
                    { tier: 1, draw: (ctx, x, y, w, h, color) => {
                        ctx.fillStyle = color;
                        ctx.beginPath(); ctx.moveTo(x, y + h * 0.6); ctx.lineTo(x - w * 0.4, y + h * 0.9); ctx.lineTo(x, y + h * 0.8); ctx.closePath(); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(x + w, y + h * 0.6); ctx.lineTo(x + w * 1.4, y + h * 0.9); ctx.lineTo(x + w, y + h * 0.8); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = ROJO; ctx.fillRect(x - w * 0.4 - 3, y + h * 0.85, 6, 6); ctx.fillRect(x + w * 1.4 - 3, y + h * 0.85, 6, 6);
                    }},
                    { tier: 2, draw: (ctx, x, y, w, h, color) => { // Alas T2
                        ctx.fillStyle = color;
                        ctx.beginPath(); ctx.moveTo(x, y + h * 0.5); ctx.lineTo(x - w * 0.7, y + h); ctx.lineTo(x, y + h); ctx.closePath(); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(x + w, y + h * 0.5); ctx.lineTo(x + w * 1.7, y + h); ctx.lineTo(x + w, y + h); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = AMARILLO; ctx.fillRect(x - w * 0.7 - 3, y + h - 3, 8, 8); ctx.fillRect(x + w * 1.7 - 5, y + h - 3, 8, 8);
                    }},
                    { tier: 3, draw: (ctx, x, y, w, h, color) => { // Alas T3
                        ctx.fillStyle = GRIS;
                        ctx.beginPath(); ctx.moveTo(x, y + h * 0.5); ctx.lineTo(x - w * 0.9, y + h); ctx.lineTo(x - w * 0.2, y + h); ctx.closePath(); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(x + w, y + h * 0.5); ctx.lineTo(x + w * 1.9, y + h); ctx.lineTo(x + w * 1.2, y + h); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = CIAN; ctx.fillRect(x - w * 0.9 - 3, y + h - 3, 10, 10); ctx.fillRect(x + w * 1.9 - 7, y + h - 3, 10, 10);
                    }}
                ],
                propulsor: [
                    { tier: 1, draw: (ctx, x, y, w, h, pulse, keys) => {
                        let eH = h * 0.5 * pulse; if(keys['ArrowUp']) eH *= 1.5;
                        ctx.fillStyle = NARANJA;
                        ctx.beginPath(); ctx.moveTo(x + w * 0.3, y + h * 0.9); ctx.lineTo(x + w * 0.7, y + h * 0.9); ctx.lineTo(x + w * 0.5, y + h + eH); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = AMARILLO;
                        ctx.beginPath(); ctx.moveTo(x + w * 0.4, y + h * 0.9); ctx.lineTo(x + w * 0.6, y + h * 0.9); ctx.lineTo(x + w * 0.5, y + h + eH * 0.6); ctx.closePath(); ctx.fill();
                    }},
                    { tier: 2, draw: (ctx, x, y, w, h, pulse, keys) => { // Propulsor T2
                        let eH = h * 0.7 * pulse; if(keys['ArrowUp']) eH *= 1.5;
                        ctx.fillStyle = CIAN;
                        ctx.beginPath(); ctx.moveTo(x + w * 0.2, y + h); ctx.lineTo(x + w * 0.4, y + h); ctx.lineTo(x + w * 0.3, y + h + eH); ctx.closePath(); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(x + w * 0.6, y + h); ctx.lineTo(x + w * 0.8, y + h); ctx.lineTo(x + w * 0.7, y + h + eH); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = BLANCO;
                        ctx.beginPath(); ctx.moveTo(x + w * 0.25, y + h); ctx.lineTo(x + w * 0.35, y + h); ctx.lineTo(x + w * 0.3, y + h + eH * 0.5); ctx.closePath(); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(x + w * 0.65, y + h); ctx.lineTo(x + w * 0.75, y + h); ctx.lineTo(x + w * 0.7, y + h + eH * 0.5); ctx.closePath(); ctx.fill();
                    }},
                    { tier: 3, draw: (ctx, x, y, w, h, pulse, keys) => { // Propulsor T3
                        let eH = h * 0.8 * pulse; if(keys['ArrowUp']) eH *= 1.8;
                        ctx.fillStyle = MORADO;
                        ctx.beginPath(); ctx.moveTo(x + w * 0.1, y + h); ctx.lineTo(x + w * 0.9, y + h); ctx.lineTo(x + w * 0.5, y + h + eH); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = ROJO;
                        ctx.beginPath(); ctx.moveTo(x + w * 0.3, y + h); ctx.lineTo(x + w * 0.7, y + h); ctx.lineTo(x + w * 0.5, y + h + eH * 0.7); ctx.closePath(); ctx.fill();
                    }}
                ],
            },
            Tanque: {
                chasis: [
                    { tier: 1, draw: (ctx, x, y, w, h, color) => {
                        ctx.fillStyle = color;
                        ctx.beginPath(); ctx.moveTo(x, y + h * 0.4); ctx.lineTo(x + w * 0.2, y); ctx.lineTo(x + w * 0.8, y); ctx.lineTo(x + w, y + h * 0.4); ctx.lineTo(x + w, y + h); ctx.lineTo(x, y + h); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = ROJO; // Cockpit
                        ctx.beginPath(); ctx.moveTo(x + w * 0.5, y + h * 0.1); ctx.lineTo(x + w * 0.7, y + h * 0.3); ctx.lineTo(x + w * 0.5, y + h * 0.5); ctx.lineTo(x + w * 0.3, y + h * 0.3); ctx.closePath(); ctx.fill();
                    }},
                    { tier: 2, draw: (ctx, x, y, w, h, color) => { // Chasis T2
                        ctx.fillStyle = GRIS;
                        ctx.beginPath(); ctx.moveTo(x - w*0.1, y + h * 0.3); ctx.lineTo(x + w * 0.2, y); ctx.lineTo(x + w * 0.8, y); ctx.lineTo(x + w*1.1, y + h * 0.3); ctx.lineTo(x + w*1.1, y + h); ctx.lineTo(x - w*0.1, y+h); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = color;
                        ctx.beginPath(); ctx.moveTo(x, y + h * 0.4); ctx.lineTo(x + w * 0.3, y+h*0.1); ctx.lineTo(x + w * 0.7, y+h*0.1); ctx.lineTo(x + w, y + h * 0.4); ctx.lineTo(x+w*0.9, y+h); ctx.lineTo(x+w*0.1, y+h); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = ROJO; // Cockpit
                        ctx.beginPath(); ctx.moveTo(x + w * 0.5, y + h * 0.2); ctx.lineTo(x + w * 0.65, y + h * 0.4); ctx.lineTo(x + w * 0.5, y + h * 0.6); ctx.lineTo(x + w * 0.35, y + h * 0.4); ctx.closePath(); ctx.fill();
                    }},
                    { tier: 3, draw: (ctx, x, y, w, h, color) => { // Chasis T3
                        ctx.fillStyle = '#333';
                        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + h); ctx.lineTo(x, y + h); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = color;
                        ctx.beginPath(); ctx.moveTo(x+w*0.1, y + h * 0.4); ctx.lineTo(x + w * 0.3, y+h*0.1); ctx.lineTo(x + w * 0.7, y+h*0.1); ctx.lineTo(x + w*0.9, y + h * 0.4); ctx.lineTo(x+w*0.9, y+h*0.9); ctx.lineTo(x+w*0.1, y+h*0.9); ctx.closePath(); ctx.fill();
                        ctx.fillStyle = ROJO_OSCURO; // Cockpit
                        ctx.beginPath(); ctx.arc(x+w*0.5, y+h*0.4, w*0.2, 0, Math.PI * 2); ctx.fill();
                    }}
                ],
                alas: [
                    { tier: 1, draw: (ctx, x, y, w, h, color) => {
                        ctx.fillStyle = color;
                        ctx.beginPath(); ctx.moveTo(x, y + h * 0.2); ctx.lineTo(x - w * 0.5, y + h * 0.5); ctx.lineTo(x - w * 0.4, y + h); ctx.lineTo(x, y + h); ctx.closePath(); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(x + w, y + h * 0.2); ctx.lineTo(x + w * 1.5, y + h * 0.5); ctx.lineTo(x + w * 1.4, y + h); ctx.lineTo(x + w, y + h); ctx.closePath(); ctx.fill();
                    }},
                    { tier: 2, draw: (ctx, x, y, w, h, color) => { // Alas T2
