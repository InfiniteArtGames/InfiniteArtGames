<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Infinite Ball - Wolf Shot Stable Pro</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; padding:0; background:#000; overflow:hidden; font-family: 'Segoe UI', Arial, sans-serif; touch-action:none; width: 100vw; height: 100vh; }
    canvas { display:block; width:100%; height:100%; touch-action: none; }
    
    #menu, #options-menu {
      position: absolute; top:0; left:0; width:100%; height:100%;
      background: linear-gradient(135deg, rgba(0,20,10,0.95) 0%, rgba(0,5,10,0.98) 100%); 
      color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; text-align: center; padding: 20px;
    }
    #options-menu { display: none; }
    h1 { font-size: 3rem; margin: 0; text-shadow: 0 0 20px #0f0; }
    .tagline { color: #0f0; font-size: 0.9rem; margin-bottom: 15px; font-weight: bold; }
    .btn { background:#0f0; color:#000; font-size:1.2rem; font-weight:bold; padding:10px 30px; border:none; border-radius:50px; margin:6px; box-shadow:0 4px 0 #0a0; cursor:pointer; min-width: 220px; }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0a0; }
    .btn-alt { background: #444; color: white; box-shadow: 0 4px 0 #222; }
    .instructions-box { font-size: 0.8rem; color: #eee; margin: 10px 0; max-width: 450px; line-height: 1.4; background: rgba(255,255,255,0.07); padding: 12px; border: 1px solid rgba(0,255,0,0.3); border-radius: 15px; }
    
    #stadium-select { margin: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .std-btn { padding: 8px 12px; border-radius: 8px; border: 2px solid #fff; cursor: pointer; background: #222; color: #fff; font-size: 0.8rem; }
    .std-active { border-color: #0f0; background: #060; }
    
    #hud { position: absolute; top: 10px; width: 100%; display: flex; flex-direction: column; align-items: center; color: white; text-shadow: 2px 2px #000; z-index: 50; pointer-events: none; }
    #timer { font-size: 1.8rem; font-weight: bold; }
    #period-label { font-size: 0.75rem; color: #0f0; letter-spacing: 2px; }

    #ui-container { position: absolute; bottom: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
    #energy-bar-bg { width: 180px; height: 8px; background: rgba(0,0,0,0.6); border: 1.5px solid #fff; border-radius: 10px; overflow: hidden; }
    #energy-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00f, #0ff); transition: width 0.3s; }
    #btn-super { pointer-events: auto; display: none; background: #000; color: #f00; font-weight: bold; padding: 8px 18px; border-radius: 8px; border: 2px solid #f00; margin-bottom: 5px; animation: wolfPulse 1s infinite; cursor: pointer; font-size: 0.9rem; }
    
    #analog-stick { position: absolute; bottom: 30px; left: 40px; width: 110px; height: 110px; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; display: none; pointer-events: auto; }
    #stick-head { position: absolute; top: 30px; left: 30px; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; }
    #btn-shoot { position: absolute; bottom: 40px; right: 40px; width: 85px; height: 85px; background: rgba(255,0,0,0.3); border: 4px solid rgba(255,0,0,0.6); border-radius: 50%; display: none; pointer-events: auto; color: white; font-weight: bold; font-size: 1.1rem; }
    @keyframes wolfPulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

<div id="hud">
  <div id="timer">02:00</div>
  <div id="period-label">1er TIEMPO</div>
</div>

<div id="ui-container">
  <button id="btn-super" onclick="activarSuperTiro()">🐺 TIRO DEL LOBO</button>
  <div id="energy-bar-bg"><div id="energy-bar-fill"></div></div>
</div>

<div id="analog-stick"><div id="stick-head"></div></div>
<button id="btn-shoot">KICK</button>

<div id="menu">
  <h1 id="menu-title">⚽ INFINITE BALL</h1>
  <p class="tagline">Infinite Art Games - David Rodríguez</p>
  <div class="instructions-box">
    • 🐺 <b>MODO PENALTIS:</b> 6 disparos por equipo. Solo arquero y tirador.<br>
    • <b>MATCH:</b> Juego completo 6vs6.<br>
    • Carga energía para usar el poder de Setsu.
  </div>
  <div id="stadium-select">
    <button class="std-btn std-active" onclick="setStadium('#0a3', this)">Clásico</button>
    <button class="std-btn" onclick="setStadium('#042', this)">Nocturno</button>
    <button class="std-btn" onclick="setStadium('#222', this)">Urbano</button>
    <button class="std-btn" onclick="setStadium('#500', this)">Setsu Fuego</button>
  </div>
  <button class="btn" id="main-btn" onclick="iniciarJuego('match')">PARTIDO COMPLETO</button>
  <button class="btn btn-alt" style="background: #c00; color:#fff;" onclick="iniciarJuego('penalties')">MODO PENALTIS</button>
  <button class="btn btn-alt" onclick="toggleOptions(true)">OPCIONES</button>
</div>

<div id="options-menu">
    <h2 style="color: #0f0;">CONFIGURACIÓN</h2>
    <div style="display:flex; gap:15px; margin-bottom: 20px;">
        <button id="ctrl-classic" class="btn std-active" onclick="setControl('classic')">TOUCH</button>
        <button id="ctrl-pro" class="btn btn-alt" onclick="setControl('pro')">PRO</button>
    </div>
    <button class="btn btn-alt" style="background:#0066ff;" onclick="toggleFullscreen()">PANTALLA COMPLETA</button>
    <br>
    <button class="btn" onclick="toggleOptions(false)">VOLVER</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const RADIO_JUGADOR = 14; 
const RADIO_PELOTA = 10;
const OFFSET_POSESION = 24;
const MARGEN_CAMPO = 25; 
const ANCHO_AREA = 80;
const RADIO_POSTE = 6;

let config = { controlMode: 'classic' }; 
let width, height, scoreRed = 0, scoreBlue = 0, goalFlash = 0, throwInFlash = 0, halftimeFlash = 0;
let gameRunning = false, timeLeft = 120, timerInterval, periodoActual = 1, colorEstadio = '#0a3';
let gameMode = 'match'; // 'match' o 'penalties'
let penaltisData = { turno: 'red', ronda: 1 };

let pelota = { x:0, y:0, radio: RADIO_PELOTA, vx:0, vy:0, owner:null, lastTouchTeam: null };
let equipoRojo = [], equipoAzul = [], porteroRojo, porteroAzul, jugadorActivo;
let lastTapTime = 0, touchPos = { x: 0, y: 0 }, energia = 0, superTiroEfecto = 0, gkHoldTimer = 0, magnetCooldown = 0;
let joystick = { active: false, dir: {x:0, y:0} };
let particulas = [];
let postes = [];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(f, d) { if (audioCtx.state === 'suspended') return; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square'; o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.04, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); }

function toggleOptions(s) { document.getElementById('options-menu').style.display = s ? 'flex' : 'none'; document.getElementById('menu').style.display = s ? 'none' : 'flex'; }
function setControl(m) { config.controlMode = m; document.getElementById('ctrl-classic').className = m === 'classic' ? 'btn std-active' : 'btn btn-alt'; document.getElementById('ctrl-pro').className = m === 'pro' ? 'btn std-active' : 'btn btn-alt'; }
function setStadium(c, b) { colorEstadio = c; document.querySelectorAll('.std-btn').forEach(x => x.classList.remove('std-active')); b.classList.add('std-active'); }

function resize() { 
    width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; 
    postes = [{x: MARGEN_CAMPO, y: height*0.28}, {x: MARGEN_CAMPO, y: height*0.72}, {x: width - MARGEN_CAMPO, y: height*0.28}, {x: width - MARGEN_CAMPO, y: height*0.72}];
    resetPositions(true); 
}
window.addEventListener('resize', resize);

function resetPositions(completo = false) {
  superTiroEfecto = 0; pelota.vx = pelota.vy = 0; pelota.owner = null; magnetCooldown = 0;
  
  if (gameMode === 'match') {
    pelota.x = width/2; pelota.y = height/2;
    const roles = ["def", "def", "def", "mid", "mid", "del"];
    const coordsY = [height*0.32, height*0.50, height*0.68, height*0.40, height*0.60, height*0.50];
    equipoRojo = roles.map((r, i) => ({ x: (i<3?width*0.18 : i<5?width*0.32 : width*0.42), y: coordsY[i], homeX: (i<3?width*0.18 : i<5?width*0.32 : width*0.42), homeY: coordsY[i], rol: r, team: "red", tRand: Math.random()*100 }));
    equipoAzul = roles.map((r, i) => ({ x: width - (i<3?width*0.18 : i<5?width*0.32 : width*0.42), y: coordsY[i], homeX: width - (i<3?width*0.18 : i<5?width*0.32 : width*0.42), homeY: coordsY[i], rol: r, team: "blue", tRand: Math.random()*100 }));
    porteroRojo = {x: 70, y: height/2, rol: "gk", team: "red", homeX: 70}; porteroAzul = {x: width-70, y: height/2, rol: "gk", team: "blue", homeX: width-70};
    if (completo) { equipoRojo.forEach(j=>j.activo=false); jugadorActivo = equipoRojo[5]; jugadorActivo.activo = true; touchPos = {x: jugadorActivo.x, y: jugadorActivo.y}; }
  } else {
    // Modo Penaltis: Solo dos jugadores
    equipoRojo = []; equipoAzul = [];
    porteroRojo = {x: 70, y: height/2, rol: "gk", team: "red", homeX: 70}; 
    porteroAzul = {x: width-70, y: height/2, rol: "gk", team: "blue", homeX: width-70};
    
    if (penaltisData.turno === 'red') {
      jugadorActivo = { x: width * 0.4, y: height/2, team: 'red', activo: true, rol: 'del' };
      equipoRojo = [jugadorActivo];
      pelota.x = jugadorActivo.x + 25; pelota.y = jugadorActivo.y;
    } else {
      jugadorActivo = { x: width * 0.6, y: height/2, team: 'blue', activo: true, rol: 'del' };
      equipoAzul = [jugadorActivo];
      pelota.x = jugadorActivo.x - 25; pelota.y = jugadorActivo.y;
    }
    pelota.owner = jugadorActivo;
  }
}

function iniciarJuego(modo) { 
    if (audioCtx.state === 'suspended') audioCtx.resume(); 
    gameMode = modo;
    document.getElementById('menu').style.display = 'none'; 
    document.getElementById('analog-stick').style.display = config.controlMode === 'pro' ? 'block' : 'none'; 
    document.getElementById('btn-shoot').style.display = config.controlMode === 'pro' ? 'block' : 'none'; 
    
    scoreRed = scoreBlue = 0; 
    energia = 0; actualizarBarra();
    
    if (modo === 'match') {
      timeLeft = 120; periodoActual = 1;
      document.getElementById('period-label').innerText = "1er TIEMPO";
      if(timerInterval) clearInterval(timerInterval); 
      timerInterval = setInterval(handleTimer, 1000);
    } else {
      penaltisData = { turno: 'red', ronda: 1 };
      document.getElementById('period-label').innerText = "PENALTIS: 1 / 6";
      if(timerInterval) clearInterval(timerInterval);
    }
    
    gameRunning = true; resize(); loop(); 
}

function handleTimer() { 
    if(timeLeft > 0) {
        timeLeft--; 
        let mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
        document.getElementById('timer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    } else { 
        if(periodoActual === 1) {
            gameRunning = false; halftimeFlash = 180; superTiroEfecto = 0;
            periodoActual = 2; timeLeft = 120; 
            document.getElementById('period-label').innerText = "2do TIEMPO";
            resetPositions(true);
            setTimeout(() => { gameRunning = true; }, 3000);
        } else {
            finalizarPartido();
        }
    } 
}

function finalizarPartido() { 
    gameRunning = false; clearInterval(timerInterval);
    let msg = scoreRed > scoreBlue ? "¡GANÓ EL EQUIPO ROJO!" : scoreBlue > scoreRed ? "¡GANÓ EL EQUIPO AZUL!" : "¡EMPATE!";
    document.getElementById('menu').style.display = 'flex'; 
    document.getElementById('menu-title').innerText = msg;
    document.getElementById('main-btn').innerText = "PLAY AGAIN";
    resetPositions(true); 
}

function actualizarBarra() { document.getElementById('energy-bar-fill').style.width = energia + "%"; document.getElementById('btn-super').style.display = energia >= 100 ? "block" : "none"; }

function handleThrowIn() {
    if (!gameRunning) return;
    if (gameMode === 'penalties') { siguienteTurnoPenalti(); return; }
    gameRunning = false; throwInFlash = 60; superTiroEfecto = 0;
    playBeep(250, 0.3);
    const teamTaking = pelota.lastTouchTeam === "red" ? equipoAzul : equipoRojo;
    const taker = teamTaking.reduce((p, c) => Math.hypot(c.x-pelota.x, c.y-pelota.y) < Math.hypot(p.x-pelota.x, p.y-pelota.y) ? c : p);
    setTimeout(() => { pelota.owner = taker; pelota.vx = 0; pelota.vy = 0; gameRunning = true; }, 1000);
}

function siguienteTurnoPenalti() {
    gameRunning = false;
    setTimeout(() => {
      if (penaltisData.turno === 'red') {
        penaltisData.turno = 'blue';
      } else {
        penaltisData.turno = 'red';
        penaltisData.ronda++;
      }
      
      if (penaltisData.ronda > 6) {
        finalizarPartido();
      } else {
        document.getElementById('period-label').innerText = `PENALTIS: ${penaltisData.ronda} / 6`;
        resetPositions();
        gameRunning = true;
      }
    }, 1500);
}

function collisionPinball(ball, obj, radioObj = RADIO_JUGADOR) {
  const dx = ball.x - obj.x, dy = ball.y - obj.y, dist = Math.hypot(dx, dy);
  if (obj.rol === "gk" && dist < 55 && magnetCooldown <= 0) { 
      ball.owner = obj; ball.vx = 0; ball.vy = 0; ball.lastTouchTeam = obj.team; 
      superTiroEfecto = 0; 
      if (gameMode === 'penalties') siguienteTurnoPenalti();
      return; 
  }
  if (dist < (radioObj + ball.radio)) {
    ball.lastTouchTeam = obj.team;
    if (obj.activo || (obj.team === "blue" && !ball.owner)) { if (!ball.owner) { ball.owner = obj; return; } }
    if (!ball.owner) { const nx = dx/dist, ny = dy/dist; ball.x = obj.x + nx*(ball.radio+radioObj+1); ball.y = obj.y + ny*(ball.radio+radioObj+1); ball.vx = (ball.vx-2*(ball.vx*nx+ball.vy*ny)*nx)*0.8; ball.vy = (ball.vy-2*(ball.vx*nx+ball.vy*ny)*ny)*0.8; }
  }
}

function dispararPelota(targetPoint = null) {
    if (pelota.owner === jugadorActivo) {
        let vx, vy, potencia = 35;
        let tX = (targetPoint ? targetPoint.x : (jugadorActivo.team === 'red' ? width : 0));
        let tY = (targetPoint ? targetPoint.y : height/2);
        let d = Math.hypot(tX - jugadorActivo.x, tY - jugadorActivo.y);
        vx = ((tX-jugadorActivo.x)/d)*potencia; vy = ((tY-jugadorActivo.y)/d)*potencia;
        pelota.vx = vx; pelota.vy = vy; pelota.owner = null; energia = Math.min(100, energia + 15); actualizarBarra(); playBeep(300, 0.1);
    }
}

function activarSuperTiro() {
  if (pelota.owner === jugadorActivo && energia >= 100) {
    superTiroEfecto = 100; 
    let tX = (jugadorActivo.team === 'red' ? width : 0);
    let dx = tX - jugadorActivo.x, dy = height/2 - jugadorActivo.y, d = Math.hypot(dx, dy);
    pelota.vx = (dx/d)*75; pelota.vy = (dy/d)*75; pelota.owner = null;
    energia = 0; actualizarBarra(); playBeep(100, 1);
  }
}

const shootBtn = document.getElementById('btn-shoot');
shootBtn.addEventListener('touchstart', e => { e.preventDefault(); dispararPelota(); });
canvas.addEventListener('touchstart', e => {
  if (!gameRunning) return;
  const t = e.touches[0], now = Date.now();
  let tp = null; equipoRojo.forEach(j => { if (Math.hypot(j.x-t.clientX, j.y-t.clientY) < 50) tp = j; });
  if (tp && gameMode === 'match') { jugadorActivo.activo = false; tp.activo = true; jugadorActivo = tp; touchPos = {x: t.clientX, y: t.clientY}; }
  else if (config.controlMode === 'classic') { if (pelota.owner === jugadorActivo && now - lastTapTime < 280) dispararPelota({x: t.clientX, y: t.clientY}); else touchPos = {x: t.clientX, y: t.clientY}; }
  lastTapTime = now;
});
canvas.addEventListener('touchmove', e => { if (gameRunning && config.controlMode === 'classic') touchPos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; });

function actualizarIA() {
  const todos = [...equipoRojo, ...equipoAzul, porteroRojo, porteroAzul];
  todos.forEach(j => {
    if (j.activo && j.team === (gameMode === 'penalties' ? penaltisData.turno : 'red')) return;
    if (j.rol === "gk") {
      j.x = j.homeX; j.y += (Math.max(height*0.28, Math.min(height*0.72, pelota.y)) - j.y) * 0.35;
      if (pelota.owner === j && ++gkHoldTimer > 80) {
        if (gameMode === 'penalties') { siguienteTurnoPenalti(); return; }
        pelota.vx = (j.team === "red" ? 22 : -22); pelota.owner = null; gkHoldTimer = 0; magnetCooldown = 60;
      }
      return;
    }
    // IA básica para Match
    if (gameMode === 'match' && j.team === 'blue') {
      if (Math.hypot(pelota.x-j.x, pelota.y-j.y) < 300) { j.x += (pelota.x-j.x)*0.05; j.y += (pelota.y-j.y)*0.05; }
    }
  });
}

function loop() {
  if (!gameRunning) {
      if (halftimeFlash > 0) { ctx.fillStyle = '#fff'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center'; ctx.fillText('DESCANSO', width/2, height/2); halftimeFlash--; requestAnimationFrame(loop); return; }
      if (throwInFlash > 0) { ctx.fillStyle = '#fff'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center'; ctx.fillText('FUERA', width/2, height/2); throwInFlash--; requestAnimationFrame(loop); return; }
      requestAnimationFrame(loop); return;
  }

  // --- Lógica de Dibujo ---
  ctx.fillStyle = colorEstadio; ctx.fillRect(0,0,width,height);
  if (superTiroEfecto > 0) { ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,width,height); }
  
  // Limites del campo
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
  if (gameMode === 'match') {
    ctx.strokeRect(MARGEN_CAMPO, MARGEN_CAMPO, width-MARGEN_CAMPO*2, height-MARGEN_CAMPO*2);
    ctx.beginPath(); ctx.moveTo(width/2, MARGEN_CAMPO); ctx.lineTo(width/2, height-MARGEN_CAMPO); ctx.stroke();
  } else {
    // Media cancha en Penaltis
    if (penaltisData.turno === 'red') {
      ctx.strokeRect(MARGEN_CAMPO, MARGEN_CAMPO, width/2, height-MARGEN_CAMPO*2);
    } else {
      ctx.strokeRect(width/2, MARGEN_CAMPO, width/2-MARGEN_CAMPO, height-MARGEN_CAMPO*2);
    }
  }

  // Movimiento Jugador
  let dX = touchPos.x-jugadorActivo.x, dY = touchPos.y-jugadorActivo.y, d = Math.hypot(dX, dY);
  if (d > 5) { jugadorActivo.x += (dX/d)*Math.min(d*0.2, 11); jugadorActivo.y += (dY/d)*Math.min(d*0.2, 11); }

  // Pelota
  if (pelota.owner) { 
    pelota.x = pelota.owner.x + (pelota.owner.team === "blue" ? -OFFSET_POSESION : OFFSET_POSESION); pelota.y = pelota.owner.y; 
  } else {
    pelota.x += pelota.vx; pelota.y += pelota.vy; pelota.vx *= 0.965; pelota.vy *= 0.965;
    if (pelota.x < 0 || pelota.x > width) {
        if (pelota.y > height*0.28 && pelota.y < height*0.72) {
            if (pelota.x < width/2) scoreBlue++; else scoreRed++;
            goalFlash = 60; playBeep(600, 0.3);
            if (gameMode === 'penalties') siguienteTurnoPenalti(); else resetPositions();
        } else {
            handleThrowIn();
        }
    }
    [...equipoRojo, ...equipoAzul, porteroRojo, porteroAzul].forEach(o => collisionPinball(pelota, o));
  }

  actualizarIA();

  // Render Jugadores
  [...equipoRojo, ...equipoAzul, porteroRojo, porteroAzul].forEach(j => {
    ctx.fillStyle = j.rol === "gk" ? '#ff0' : (j.team === "red" ? '#c00' : '#00f');
    ctx.beginPath(); ctx.arc(j.x, j.y, RADIO_JUGADOR, 0, Math.PI*2); ctx.fill();
    if (j.activo) { ctx.strokeStyle = '#0f0'; ctx.lineWidth = 3; ctx.stroke(); }
  });

  ctx.fillStyle = '#eee'; ctx.beginPath(); ctx.arc(pelota.x, pelota.y, pelota.radio, 0, Math.PI*2); ctx.fill();
  if (superTiroEfecto > 0) superTiroEfecto--;

  // HUD
  ctx.fillStyle = '#fff'; ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center';
  ctx.fillText(`${scoreRed} - ${scoreBlue}`, width/2, 60);
  if (goalFlash-- > 0) { ctx.font = 'bold 80px Arial'; ctx.fillStyle = '#f00'; ctx.fillText('¡GOL!', width/2, height/2); }

  requestAnimationFrame(loop);
}
resize();
</script>
</body>
</html>
