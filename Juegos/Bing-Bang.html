<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bing-Bang∞ | Sét-su vs Setsu | Infinite Art Games</title>
    <style>
        :root {
            --primary: #a020f0;
            --accent: #00d4ff;
            --neon-ball: #39ff14;
            --bg: #020005;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(70, 0, 130, 0.3) 0%, rgba(2, 0, 5, 1) 95%);
        }

        #scoreContainer {
            display: flex; gap: 80px; margin-bottom: 20px; align-items: center;
        }

        .score-block { display: flex; flex-direction: column; text-align: center; }
        .score-name { font-size: 2.2em; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }
        .score-number { font-size: 4em; font-weight: bold; line-height: 1; }

        #name-cpu { color: var(--primary); text-shadow: 0 0 25px var(--primary); }
        #name-you { color: var(--accent); text-shadow: 0 0 20px var(--accent); }

        #pongContainer {
            position: relative;
            width: 800px; height: 500px;
            max-width: 95vw; max-height: 70vh;
            border: 2px solid rgba(160, 32, 240, 0.8);
            border-radius: 15px;
            box-shadow: 0 0 80px rgba(160, 32, 240, 0.5);
            background: #000; overflow: hidden; touch-action: none;
        }

        canvas { width: 100%; height: 100%; display: block; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }

        .btn-play {
            background: transparent; color: var(--neon-ball);
            border: 2px solid var(--neon-ball);
            padding: 15px 50px; font-size: 1.5em; font-weight: bold;
            cursor: pointer; border-radius: 50px;
            box-shadow: 0 0 20px var(--neon-ball);
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-play:hover { background: var(--neon-ball); color: #000; box-shadow: 0 0 50px var(--neon-ball); }

        #fullscreenBtn {
            position: absolute; bottom: 12px; right: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 8px; cursor: pointer; border-radius: 4px;
            font-size: 10px; z-index: 20; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="scoreContainer">
        <div class="score-block">
            <span class="score-name" id="name-cpu">? ? ?</span>
            <span class="score-number" id="score-setsu" style="color: var(--primary);">0</span>
        </div>
        <div style="font-size: 3em; color: rgba(255,255,255,0.1); font-weight: 900;">∞</div>
        <div class="score-block">
            <span class="score-name" id="name-you">TÚ</span>
            <span class="score-number" id="score-you" style="color: var(--accent);">0</span>
        </div>
    </div>

    <div id="pongContainer">
        <div id="menuOverlay" class="overlay">
            <h1 style="letter-spacing:15px; text-shadow: 0 0 30px var(--primary); font-size: 4em; margin: 0;">BING-BANG</h1>
            <p id="subTitle" style="color: var(--accent); letter-spacing: 5px; margin-bottom: 30px;">DESTINO ALEATORIO</p>
            <div id="winnerAnnounce" style="margin-bottom:25px; font-weight:bold; font-size: 1.5em; text-align: center;"></div>
            <button class="btn-play" onclick="startGame()">ENTRAR AL CICLO</button>
        </div>
        <canvas id="pongCanvas" width="800" height="500"></canvas>
        <button id="fullscreenBtn" onclick="toggleFullScreen()">∞ FS</button>
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('pongContainer');
        const scoreSetsu = document.getElementById('score-setsu');
        const scoreYou = document.getElementById('score-you');
        const menuOverlay = document.getElementById('menuOverlay');
        const winnerAnnounce = document.getElementById('winnerAnnounce');
        const cpuNameLabel = document.getElementById('name-cpu');
        const subTitleLabel = document.getElementById('subTitle');

        let bX, bY, bSX, bSY, lastBX, lastBY;
        let pY = 210, aY = 210; 
        let sS = 0, yS = 0; 
        let gameRunning = false;
        let baseSpeed = 8.5;
        let lastTimestamp = 0;
        let singularityState = 'idle';
        let singularityTimer = 0;
        let ballColor = '#39ff14';
        let shake = 0;
        let currentOpponent = "SÉT-SU"; // Por defecto

        const stars = [];
        const particles = [];
        for(let i = 0; i < 100; i++) stars.push({x: Math.random()*800, y: Math.random()*500, s: Math.random()*1.5, o: Math.random()});

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random()-0.5)*4; this.vy = (Math.random()-0.5)*4;
                this.life = 1; this.decay = 0.035; this.size = Math.random()*3+1; this.color = color;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
            }
        }

        function resetBall() {
            bX = 400; bY = 250; lastBX = bX; lastBY = bY;
            bSX = (Math.random() > 0.5 ? 1 : -1) * baseSpeed;
            bSY = (Math.random() - 0.5) * baseSpeed;
            singularityState = 'idle'; ballColor = '#39ff14';
        }

        function startGame() {
            // SELECCIÓN ALEATORIA DE OPONENTE
            currentOpponent = Math.random() > 0.5 ? "SÉT-SU" : "SETSU";
            cpuNameLabel.innerText = currentOpponent;
            
            if(currentOpponent === "SÉT-SU") {
                subTitleLabel.innerText = "MODO DIOS ACTIVO";
                cpuNameLabel.style.textShadow = "0 0 25px #a020f0, 0 0 50px #a020f0";
            } else {
                subTitleLabel.innerText = "MODO ANIMAL ACTIVO";
                cpuNameLabel.style.textShadow = "0 0 25px #ff0000"; // Rojo para Setsu el lobo
            }

            sS = 0; yS = 0; scoreSetsu.innerText = "0"; scoreYou.innerText = "0";
            menuOverlay.style.display = "none"; resetBall(); gameRunning = true;
            lastTimestamp = performance.now(); requestAnimationFrame(gameLoop);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) container.requestFullscreen().catch(e => console.log(e));
            else document.exitFullscreen();
        }

        // --- IA PREDICCIÓN (Solo Sét-su la usa al 100%) ---
        function predictBallY() {
            if (bSX > 0) return 210; 
            let tempX = bX, tempY = bY, tempSX = bSX, tempSY = bSY;
            while (tempX > 25) {
                tempX += tempSX; tempY += tempSY;
                if (tempY <= 12 || tempY >= 488) tempSY *= -1;
            }
            return tempY - 40;
        }

        function checkCollision() {
            if (bY <= 12 || bY >= 488) { bSY *= -1; bY = bY <= 12 ? 13 : 487; }

            // CPU
            if (lastBX > 25 && bX <= 25) {
                let t = (25 - lastBX) / (bX - lastBX);
                let interceptY = lastBY + t * (bY - lastBY);
                if (interceptY > aY && interceptY < aY + 80) {
                    bX = 26; bSX = Math.abs(bSX) * 1.08; bSY += (interceptY - (aY + 40)) * 0.3;
                    if(currentOpponent === "SÉT-SU") shake = 12; // Solo el Dios sacude la realidad
                    for(let i=0; i<12; i++) particles.push(new Particle(bX, interceptY, currentOpponent === "SÉT-SU" ? '#fff' : '#f00'));
                    return;
                }
            }

            // PLAYER
            if (lastBX < 775 && bX >= 775) {
                let t = (775 - lastBX) / (bX - lastBX);
                let interceptY = lastBY + t * (bY - lastBY);
                if (interceptY > pY && interceptY < pY + 80) {
                    bX = 774; bSX = -Math.abs(bSX) * 1.05; bSY += (interceptY - (pY + 40)) * 0.3;
                    for(let i=0; i<8; i++) particles.push(new Particle(bX, interceptY, 'cyan'));
                    return;
                }
            }
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;
            let dt = Math.min((timestamp - lastTimestamp) / 16.67, 1.5);
            lastTimestamp = timestamp;

            lastBX = bX; lastBY = bY;
            bX += bSX * dt; bY += bSY * dt;

            if(Math.random() > 0.4) particles.push(new Particle(bX, bY, ballColor));
            checkCollision();

            // Singularidad
            singularityTimer += dt;
            if (singularityTimer > 350) {
                let r = Math.random();
                if (r < 0.15) { singularityState = 'blackhole'; ballColor = '#ffffff'; }
                else if (r < 0.4) { singularityState = 'active'; ballColor = '#00d4ff'; }
                else { singularityState = 'idle'; ballColor = '#39ff14'; }
                singularityTimer = 0;
            }

            let dC = Math.hypot(bX - 400, bY - 250);
            if (dC < 70 && singularityState === 'blackhole') {
                bSX *= 0.95; bSY *= 0.95;
                let angle = Math.atan2(250 - bY, 400 - bX);
                bX += Math.cos(angle) * 4 * dt; bY += Math.sin(angle) * 4 * dt;
                if(dC < 10) { bSX = (Math.random()-0.5)*22; bSY = (Math.random()-0.5)*22; singularityState = 'idle'; }
            }

            if (bX < 0) { yS++; scoreYou.innerText = yS; resetBall(); if(yS>=10) endGame("HAS SOBREVIVIDO AL CICLO"); }
            if (bX > 800) { sS++; scoreSetsu.innerText = sS; resetBall(); if(sS>=10) endGame(currentOpponent + " RECLAMA TU ALMA"); }

            // LÓGICA DIFERENCIADA DE IA
            let targetY;
            if(currentOpponent === "SÉT-SU") {
                targetY = predictBallY(); // Predicción perfecta
                aY += (targetY - aY) * 0.22 * dt; 
            } else {
                targetY = bY - 40; // Seguimiento simple (Setsu lobo)
                aY += (targetY - aY) * 0.12 * dt; // Más lento y falible
            }
            aY = Math.max(0, Math.min(420, aY));

            // Controles
            canvas.onmousemove = (e) => { let r = canvas.getBoundingClientRect(); pY = Math.max(0, Math.min(420, (e.clientY - r.top) * (500 / r.height) - 40)); };
            canvas.ontouchmove = (e) => { e.preventDefault(); let r = canvas.getBoundingClientRect(); pY = Math.max(0, Math.min(420, (e.touches[0].clientY - r.top) * (500 / r.height) - 40)); };

            for(let i = particles.length - 1; i >= 0; i--) { particles[i].update(); if(particles[i].life <= 0) particles.splice(i, 1); }

            draw();
            if (shake > 0) shake -= 0.6;
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.save();
            if (shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
            
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 800, 500);
            ctx.fillStyle = '#fff'; stars.forEach(s => { ctx.globalAlpha = s.o; ctx.fillRect(s.x, s.y, s.s, s.s); }); ctx.globalAlpha = 1;

            // Centro ∞
            ctx.save(); ctx.translate(400, 250);
            let sC = singularityState === 'blackhole' ? '#f00' : (singularityState === 'active' ? '#00d4ff' : 'rgba(160,32,240,0.3)');
            if (singularityState === 'blackhole') {
                ctx.shadowBlur = 50; ctx.shadowColor = '#f00'; ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#f00'; ctx.lineWidth = 2; ctx.stroke();
            }
            ctx.strokeStyle = sC; ctx.lineWidth = 4; ctx.shadowBlur = 20; ctx.shadowColor = sC;
            ctx.beginPath();
            for(let i=0; i<Math.PI*2; i+=0.06){
                let r = 75 + Math.sin(Date.now()/400)*8;
                let d = 1 + Math.pow(Math.sin(i), 2);
                let x = (r * Math.cos(i)) / d; let y = (r * Math.sin(i) * Math.cos(i)) / d;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.stroke(); ctx.restore();

            particles.forEach(p => p.draw());
            
            ctx.shadowBlur = 30;
            // Color de paleta según enemigo
            ctx.fillStyle = currentOpponent === "SÉT-SU" ? '#a020f0' : '#ff0000'; 
            ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(10, aY, 15, 80); 

            ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.fillRect(775, pY, 15, 80); 
            ctx.fillStyle = ballColor; ctx.shadowColor = ballColor;
            ctx.beginPath(); ctx.arc(bX, bY, 11, 0, Math.PI*2); ctx.fill();
            
            ctx.restore();
        }

        function endGame(m) { gameRunning = false; menuOverlay.style.display = "flex"; winnerAnnounce.innerText = m; }
    </script>
</body>
</html>
