<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bing-Bang∞ Neón | SÉT-SU vs TÚ</title>
    <style>
        :root {
            --primary: #a020f0;
            --accent: #00d4ff;
            --neon-ball: #39ff14;
            --bg: #020005;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(70, 0, 130, 0.25) 0%, rgba(2, 0, 5, 1) 90%);
        }

        #scoreContainer {
            display: flex; gap: 50px; margin-bottom: 15px; align-items: center;
        }

        .score-block { display: flex; flex-direction: column; text-align: center; }
        .score-number { font-size: 3.5em; font-weight: bold; line-height: 1; }
        #name-setsu { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        #name-you { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        #pongContainer {
            position: relative;
            width: 800px; height: 500px;
            max-width: 95vw; max-height: 70vh;
            border: 2px solid rgba(160, 32, 240, 0.6);
            border-radius: 15px;
            box-shadow: 0 0 60px rgba(160, 32, 240, 0.4);
            background: #000;
            overflow: hidden; touch-action: none;
        }

        canvas { width: 100%; height: 100%; display: block; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
        }

        .btn-play {
            background: transparent; color: var(--neon-ball);
            border: 2px solid var(--neon-ball);
            padding: 15px 50px; font-size: 1.3em; font-weight: bold;
            cursor: pointer; border-radius: 50px;
            box-shadow: 0 0 20px var(--neon-ball);
            transition: 0.3s; text-transform: uppercase;
        }

        .btn-play:hover { background: var(--neon-ball); color: #000; box-shadow: 0 0 40px var(--neon-ball); }

        #fullscreenBtn {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(160, 32, 240, 0.3);
            color: white; border: 1px solid var(--primary);
            padding: 10px 15px; cursor: pointer; border-radius: 8px;
            font-size: 12px; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="scoreContainer">
        <div class="score-block">
            <span style="font-size: 0.7em; letter-spacing: 2px;">SÉT-SU</span>
            <span class="score-number" id="score-setsu">0</span>
        </div>
        <div style="font-size: 2em; opacity: 0.3; font-weight: bold;">∞</div>
        <div class="score-block">
            <span style="font-size: 0.7em; letter-spacing: 2px;">TÚ</span>
            <span class="score-number" id="score-you">0</span>
        </div>
    </div>

    <div id="pongContainer">
        <div id="menuOverlay" class="overlay">
            <h1 style="letter-spacing:18px; text-shadow: 0 0 25px var(--primary); font-size: 3.5em; margin: 0;">BING-BANG</h1>
            <p style="color: var(--accent); letter-spacing: 5px; margin-bottom: 30px;">SINGULARIDAD ARCADE</p>
            <div id="winnerAnnounce" style="margin-bottom:25px; font-weight:bold; font-size: 1.2em;"></div>
            <button class="btn-play" onclick="startGame()">INICIAR CICLO</button>
        </div>
        <canvas id="pongCanvas" width="800" height="500"></canvas>
        <button id="fullscreenBtn" onclick="toggleFullScreen()">PANTALLA COMPLETA</button>
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('pongContainer');
        const scoreSetsu = document.getElementById('score-setsu');
        const scoreYou = document.getElementById('score-you');
        const menuOverlay = document.getElementById('menuOverlay');
        const winnerAnnounce = document.getElementById('winnerAnnounce');

        let bX, bY, bSX, bSY, lastBX, lastBY;
        let pY = 210, aY = 210; 
        let sS = 0, yS = 0; 
        let gameRunning = false;
        let baseSpeed = 8;
        let lastTimestamp = 0;
        let singularityState = 'idle'; // idle, active, blackhole
        let singularityTimer = 0;
        let ballColor = '#39ff14';

        const stars = [];
        const particles = [];

        for(let i = 0; i < 120; i++) stars.push({
            x: Math.random() * 800, y: Math.random() * 500, 
            s: Math.random() * 2, o: Math.random()
        });

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.life = 1; this.decay = 0.03;
                this.size = Math.random() * 4 + 1;
                this.color = color;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color; ctx.shadowBlur = 12; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill(); ctx.restore();
            }
        }

        function resetBall() {
            bX = 400; bY = 250; lastBX = bX; lastBY = bY;
            let dir = Math.random() > 0.5 ? 1 : -1;
            bSX = dir * baseSpeed;
            bSY = (Math.random() - 0.5) * baseSpeed;
            singularityState = 'idle';
            ballColor = '#39ff14';
            particles.length = 0;
        }

        function startGame() {
            sS = 0; yS = 0; scoreSetsu.innerText = "0"; scoreYou.innerText = "0";
            menuOverlay.style.display = "none";
            resetBall(); gameRunning = true;
            lastTimestamp = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) container.requestFullscreen().catch(e => console.log(e));
            else document.exitFullscreen();
        }

        function checkCollision() {
            if (bY <= 12) { bY = 12; bSY *= -1.02; }
            if (bY >= 488) { bY = 488; bSY *= -1.02; }

            // Lógica de colisión por túnel para SÉT-SU (IA)
            if (lastBX > 25 && bX <= 25) {
                let t = (25 - lastBX) / (bX - lastBX);
                let interceptY = lastBY + t * (bY - lastBY);
                if (interceptY > aY && interceptY < aY + 80) {
                    bX = 26; bSX = Math.abs(bSX) * 1.05;
                    bSY += (interceptY - (aY + 40)) * 0.3;
                    createImpact(bX, interceptY, varColor('--primary'));
                    return;
                }
            }

            // Lógica para TÚ (Player)
            if (lastBX < 775 && bX >= 775) {
                let t = (775 - lastBX) / (bX - lastBX);
                let interceptY = lastBY + t * (bY - lastBY);
                if (interceptY > pY && interceptY < pY + 80) {
                    bX = 774; bSX = -Math.abs(bSX) * 1.05;
                    bSY += (interceptY - (pY + 40)) * 0.3;
                    createImpact(bX, interceptY, varColor('--accent'));
                    return;
                }
            }
        }

        function createImpact(x, y, color) {
            for(let i=0; i<10; i++) particles.push(new Particle(x, y, color));
        }

        function movePaddle(clientY) {
            let rect = canvas.getBoundingClientRect();
            let pos = (clientY - rect.top) * (500 / rect.height);
            pY = Math.max(0, Math.min(420, pos - 40));
        }

        canvas.addEventListener('mousemove', e => movePaddle(e.clientY));
        canvas.addEventListener('touchmove', e => { e.preventDefault(); movePaddle(e.touches[0].clientY); }, {passive: false});

        function gameLoop(timestamp) {
            if (!gameRunning) return;
            let dt = Math.min((timestamp - lastTimestamp) / 16.67, 1.5);
            lastTimestamp = timestamp;

            lastBX = bX; lastBY = bY;
            bX += bSX * dt; bY += bSY * dt;

            // Partículas de rastro
            if(Math.random() > 0.4) particles.push(new Particle(bX, bY, ballColor));

            checkCollision();

            // Ciclo de la Singularidad
            singularityTimer += dt;
            if (singularityTimer > 350) {
                let r = Math.random();
                if (r < 0.18) { singularityState = 'blackhole'; ballColor = '#ffffff'; }
                else if (r < 0.45) { singularityState = 'active'; ballColor = varColor('--accent'); }
                else { singularityState = 'idle'; ballColor = varColor('--neon-ball'); }
                singularityTimer = 0;
            }

            let dCenter = Math.hypot(bX - 400, bY - 250);
            if (dCenter < 70) {
                if (singularityState === 'blackhole') {
                    // Atracción de Agujero Negro
                    bSX *= 0.94; bSY *= 0.94;
                    let angle = Math.atan2(250 - bY, 400 - bX);
                    bX += Math.cos(angle) * 3 * dt;
                    bY += Math.sin(angle) * 3 * dt;
                    
                    if(dCenter < 10) { 
                        let launchAngle = Math.random() * Math.PI * 2;
                        bSX = Math.cos(launchAngle) * 18;
                        bSY = Math.sin(launchAngle) * 18;
                        singularityState = 'idle';
                        createImpact(400, 250, '#fff');
                    }
                } else if (singularityState === 'active') {
                    bSX *= 1.03; // Aceleración cuántica
                }
            }

            if (bX < 0) { yS++; scoreYou.innerText = yS; resetBall(); if(yS>=10) endGame("¡HAS DOMINADO EL INFINITO!"); }
            if (bX > 800) { sS++; scoreSetsu.innerText = sS; resetBall(); if(sS>=10) endGame("SÉT-SU ES INALCANZABLE"); }

            // IA SÉT-SU (Poderosa)
            aY += (bY - (aY + 40)) * 0.14 * dt;
            aY = Math.max(0, Math.min(420, aY));

            for(let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if(particles[i].life <= 0) particles.splice(i, 1);
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 800, 500);
            
            // Estrellas
            ctx.fillStyle = '#fff';
            stars.forEach(s => { ctx.globalAlpha = s.o; ctx.fillRect(s.x, s.y, s.s, s.s); });
            ctx.globalAlpha = 1;

            // --- AGUJERO NEGRO Y SÍMBOLO ∞ ---
            ctx.save(); ctx.translate(400, 250);
            let sColor = singularityState === 'active' ? varColor('--accent') : (singularityState === 'blackhole' ? '#ff2222' : 'rgba(160,32,240,0.5)');
            
            // Efecto Visual Agujero Negro (NÚCLEO)
            if (singularityState === 'blackhole') {
                // Horizonte de Eventos
                ctx.shadowBlur = 40; ctx.shadowColor = '#f00';
                ctx.fillStyle = '#000'; ctx.beginPath();
                ctx.arc(0, 0, 22 + Math.sin(Date.now()/150)*4, 0, Math.PI*2); ctx.fill();
                
                // Distorsión Roja
                ctx.strokeStyle = '#f00'; ctx.lineWidth = 2; ctx.stroke();
            }

            // Dibujo de Lemniscata ∞
            ctx.strokeStyle = sColor; ctx.lineWidth = 4; ctx.shadowBlur = 20; ctx.shadowColor = sColor;
            ctx.beginPath();
            for(let i=0; i<Math.PI*2; i+=0.08){
                let r = 75 + Math.sin(Date.now()/400)*6;
                let denom = 1 + Math.pow(Math.sin(i), 2);
                let x = (r * Math.cos(i)) / denom;
                let y = (r * Math.sin(i) * Math.cos(i)) / denom;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.stroke(); ctx.restore();

            particles.forEach(p => p.draw());

            // Paletas y Pelota
            ctx.shadowBlur = 25;
            ctx.fillStyle = varColor('--primary'); ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(10, aY, 15, 80); // SÉT-SU
            
            ctx.fillStyle = varColor('--accent'); ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(775, pY, 15, 80); // TÚ
            
            ctx.fillStyle = ballColor; ctx.shadowColor = ballColor;
            ctx.beginPath(); ctx.arc(bX, bY, 11, 0, Math.PI*2); ctx.fill();
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
        function endGame(m) { gameRunning = false; menuOverlay.style.display = "flex"; winnerAnnounce.innerText = m; winnerAnnounce.style.color = (yS>=10?varColor('--accent'):varColor('--primary'));}
    </script>
</body>
</html>
