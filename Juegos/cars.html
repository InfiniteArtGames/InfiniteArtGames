<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Infinite Art GP - The Definitive Version</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; margin: 0 auto; background: #222; border-left: 5px solid #f39c12; border-right: 5px solid #f39c12; }
        #hud { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.9); padding: 15px; border: 3px solid #f39c12; pointer-events: none; border-radius: 12px; z-index: 10; min-width: 160px; }
        #msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 60px; text-align: center; text-shadow: 6px 6px #000; z-index: 20; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 25px; border: 5px solid gold; width: 70%; display: block; }
        .stat { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

<div id="hud">
    <span class="stat">RANK:</span> <span id="rank">--</span>/10<br>
    <span class="stat">AMMO:</span> <span id="ammo">5</span><br>
    <span class="stat">POWER:</span> <span id="pwr" style="color:#eee">NORMAL</span><br>
    <span class="stat">META:</span> <span id="dist">5000</span>km
</div>
<div id="msg">3</div>
<canvas id="raceCanvas"></canvas>

<script>
const canvas = document.getElementById('raceCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth > 900 ? 900 : window.innerWidth;
canvas.height = window.innerHeight;

// --- FUNCIÓN PANTALLA COMPLETA ---
function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
            console.log(`Error al activar pantalla completa: ${err.message}`);
        });
    }
}

const GOAL_DIST = 50000; 
let playerProgress = 0, worldSpeed = 0, gameState = "COUNTDOWN", timer = 3;
let allBullets = [], racers = [], items = [], particles = [], windLines = [];
let shake = 0; 

const biomes = [
    { name: "Valle", grass: "#1b5e20", track1: "#444", track2: "#333", border1: "#eee", border2: "#d32f2f", tree: "#145514" },
    { name: "Noche", grass: "#0a0a2a", track1: "#111", track2: "#050505", border1: "#00f2ff", border2: "#7000ff", tree: "#001a33" },
    { name: "Marte", grass: "#a04000", track1: "#5d4037", track2: "#4e342e", border1: "#ffcc80", border2: "#e65100", tree: "#4e342e" }
];
let currentBiome = biomes[0];
const racerColors = ['#f39c12', '#9b59b6', '#3498db', '#1abc9c', '#f1c40f', '#ecf0f1', '#e74c3c', '#2c3e50', '#27ae60'];

function init() {
    currentBiome = biomes[Math.floor(Math.random() * biomes.length)];
    const B_SPEED = 12.5;
    racers = [{ id: 0, x: canvas.width/2, progress: 0, color: '#e74c3c', isPlayer: true, stun: 0, ammo: 5, gunType: "NORMAL", baseSpeed: B_SPEED, nitro: 0, missiles: 0 }];
    
    for(let i=0; i<9; i++) {
        racers.push({
            id: i+1, x: canvas.width/2 + (i % 3 - 1) * 160, progress: (i + 1) * 300, 
            color: racerColors[i % racerColors.length], isPlayer: false, stun: 0, ammo: 5, gunType: "NORMAL",
            baseSpeed: B_SPEED + (Math.random() * 1.5 - 0.75), motorFlux: 0.5 + Math.random(), shootTimer: 120, nitro: 0, missiles: 0
        });
    }

    const spots = [7000, 14000, 21000, 28000, 35000, 42000];
    const pTypes = ['B', 'T', 'N', 'S', 'M', 'B'];
    spots.forEach(dist => {
        for(let j=0; j<6; j++) {
            items.push({ type: pTypes[j], x: (canvas.width/2 - 250) + (j * 100), progress: dist, active: true });
        }
    });
    for(let i=0; i<25; i++) windLines.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, len: 40 + Math.random()*60 });
}
init();

function createExplosion(x, y, color, count=15) {
    for(let i=0; i<count; i++) particles.push({ x: x, y: y, vX: (Math.random()-0.5)*15, vY: (Math.random()-0.5)*15, life: 1.0, color: color });
}

function triggerSonicBomb(owner) {
    shake = 25;
    let yPos = owner.isPlayer ? canvas.height - 150 : (canvas.height - 150) - (owner.progress - playerProgress);
    createExplosion(owner.x, yPos, '#fff', 35);
    racers.forEach(r => {
        if(r.id !== owner.id) {
            let distY = owner.progress - r.progress;
            if(distY > 0 && distY < 700 && Math.abs(r.x - owner.x) < 220) {
                r.stun = 150; createExplosion(r.x, (canvas.height - 150) - (r.progress - playerProgress), '#f0f', 12);
            }
        }
    });
}

function drawF1Car(x, y, color, stun, isNitro) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(-30, 15, 60, 40);
    ctx.fillStyle = '#111';
    ctx.fillRect(-40, -30, 14, 22); ctx.fillRect(26, -30, 14, 22);
    ctx.fillRect(-42, 10, 16, 26);  ctx.fillRect(26, 10, 16, 26);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.moveTo(0, -50); ctx.lineTo(12, -10); ctx.lineTo(14, 30); ctx.lineTo(-14, 30); ctx.lineTo(-12, -10); ctx.fill();
    ctx.fillStyle = shadeColor(color, -25);
    ctx.fillRect(-28, -5, 15, 25); ctx.fillRect(13, -5, 15, 25);
    ctx.fillStyle = '#222'; ctx.fillRect(-38, -48, 76, 6);
    ctx.fillStyle = '#111'; ctx.fillRect(-42, 32, 84, 10);
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffff00'; ctx.beginPath(); ctx.arc(0, -2, 6, 0, Math.PI*2); ctx.fill();
    if(stun > 0) { ctx.fillStyle='white'; ctx.font="bold 20px Arial"; ctx.fillText("X X", -16, -10); }
    if(isNitro) { ctx.fillStyle='#00f2ff'; ctx.beginPath(); ctx.arc(0, 45, 15, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
}

function shadeColor(color, percent) {
    let num = parseInt(color.replace("#",""),16), amt = Math.round(2.55 * percent), R = (num >> 16) + amt, G = (num >> 8 & 0x00FF) + amt, B = (num & 0x0000FF) + amt;
    return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
}

function fire(r) {
    const isTriple = r.gunType === "TRIPLE";
    const bColor = isTriple ? '#00f2ff' : '#fff';
    if(r.missiles > 0) {
        let target = null; let minDist = 99999;
        racers.forEach(o => { if(o.id !== r.id && o.progress > r.progress) { let d = o.progress-r.progress; if(d < minDist){ minDist=d; target=o; } } });
        allBullets.push({ x: r.x, progress: r.progress + 130, dy: 52, ownerId: r.id, color: '#3dfc03', isMissile: true, target: target });
        r.missiles--;
    } else {
        if (isTriple) {
            allBullets.push({ x: r.x - 20, progress: r.progress + 100, dy: 70, ownerId: r.id, color: bColor });
            allBullets.push({ x: r.x + 20, progress: r.progress + 100, dy: 70, ownerId: r.id, color: bColor });
        }
        allBullets.push({ x: r.x, progress: r.progress + 130, dy: 70, ownerId: r.id, color: bColor });
        r.ammo--;
    }
}

const msgBox = document.getElementById('msg');
let countdown = setInterval(() => {
    timer--;
    if(timer > 0) msgBox.innerText = timer;
    else if(timer === 0) { msgBox.innerText = "¡FUERA!"; gameState = "RACING"; }
    else { msgBox.style.display = "none"; clearInterval(countdown); }
}, 1000);

function drawTree(x, y) {
    ctx.fillStyle = currentBiome.tree;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 25, y + 70); ctx.lineTo(x - 25, y + 70); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x, y + 25); ctx.lineTo(x + 35, y + 100); ctx.lineTo(x - 35, y + 100); ctx.fill();
}

function update() {
    if(gameState === "RACING") {
        let sorted = [...racers].sort((a,b) => b.progress - a.progress);
        let playerRank = sorted.findIndex(r => r.id === 0) + 1;
        let leaderP = sorted[0].progress;

        let curve = (playerProgress > 1500) ? Math.sin((playerProgress - 1500) / 2500) * 230 : 0;
        let targetSpeed = (canvas.height - tY) / 20;
        
        if(racers[0].nitro > 0) { targetSpeed += 25; racers[0].nitro--; shake = 3; }
        if (Math.abs(racers[0].x - (canvas.width/2 + curve)) > 195) targetSpeed *= 0.3; 
        if (playerRank > 2) targetSpeed += (leaderP - playerProgress) / 120; 

        worldSpeed += (targetSpeed - worldSpeed) * 0.12;
        if(racers[0].stun > 0) { worldSpeed *= 0.2; racers[0].stun--; shake = 6; }
        
        playerProgress += worldSpeed;
        racers[0].progress = playerProgress;
        racers[0].x += (tX - racers[0].x) * 0.2;

        windLines.forEach(l => { 
            l.y += worldSpeed * 2.5 + 15; 
            if(l.y > canvas.height) { l.y = -100; l.x = Math.random() * canvas.width; } 
        });

        particles.forEach((p, i) => { p.x += p.vX; p.y += p.vY; p.life -= 0.03; if(p.life <= 0) particles.splice(i, 1); });
        
        allBullets.forEach((b, i) => {
            if(b.isMissile && b.target) { b.x += (b.target.x - b.x) * 0.12; b.progress += b.dy; }
            else { b.progress += b.dy; }
            if(Math.abs(b.progress - playerProgress) > 5000) allBullets.splice(i, 1);
        });

        racers.forEach(r => {
            if(!r.isPlayer && r.stun <= 0) {
                let rankIA = sorted.findIndex(rac => rac.id === r.id) + 1;
                r.progress += r.baseSpeed + (rankIA > 3 ? (leaderP - r.progress) / 180 : 0) + (r.nitro > 0 ? 20 : 0);
                if(r.nitro > 0) r.nitro--;
                if((r.ammo > 0 || r.missiles > 0) && Math.abs(r.x - racers[0].x) < 65 && racers[0].progress > r.progress) { r.shootTimer--; if(r.shootTimer <= 0) { fire(r); r.shootTimer = 150; } }
                let rC = (r.progress > 1500) ? Math.sin((r.progress - 1500) / 2500) * 230 : 0;
                r.x += ((canvas.width/2 + rC) - r.x) * 0.06;
            }
        });

        racers.forEach(r => {
            let rY = r.isPlayer ? canvas.height - 150 : (canvas.height - 150) - (r.progress - playerProgress);
            allBullets.forEach((b, bi) => { 
                if(b.ownerId !== r.id && Math.abs(r.x - b.x) < 50 && Math.abs(r.progress - b.progress) < 130) { 
                    r.stun = 120; createExplosion(r.x, rY, b.color, 22); allBullets.splice(bi, 1); if(r.isPlayer) shake = 20; 
                } 
            });
            racers.forEach(other => {
                if(r.id !== other.id && Math.abs(r.x - other.x) < 60 && Math.abs(r.progress - other.progress) < 100) {
                    if(r.x < other.x) { r.x -= 8; other.x += 8; } else { r.x += 8; other.x -= 8; }
                    if(r.isPlayer) { worldSpeed *= 0.8; shake = 10; }
                }
            });
            items.forEach(p => { 
                if(p.active && Math.abs(r.x - p.x) < 60 && Math.abs(r.progress - p.progress) < 120) { 
                    if(p.type === 'B') r.ammo += 5; 
                    if(p.type === 'T') r.gunType = "TRIPLE"; 
                    if(p.type === 'N') r.nitro = 150;
                    if(p.type === 'S') triggerSonicBomb(r);
                    if(p.type === 'M') r.missiles += 2;
                    p.active = false; 
                } 
            });
        });

        document.getElementById('rank').innerText = playerRank;
        document.getElementById('ammo').innerText = racers[0].ammo + (racers[0].missiles > 0 ? " +M" : "");
        document.getElementById('pwr').innerText = racers[0].gunType;
        document.getElementById('dist').innerText = Math.max(0, Math.floor((GOAL_DIST - playerProgress)/10));
        if(playerProgress >= GOAL_DIST) { gameState = "FINISHED"; msgBox.style.display = "block"; msgBox.innerHTML = "¡FINAL! " + (playerRank === 1 ? "🏆" : ""); }
        if(shake > 0) shake *= 0.85;
    }
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    if(shake > 0.1) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    let curve = (playerProgress > 1500) ? Math.sin((playerProgress - 1500) / 2500) * 230 : 0;
    ctx.translate(-curve * 0.7, 0);

    ctx.fillStyle = currentBiome.grass; ctx.fillRect(-2000, 0, 5000, canvas.height);
    
    ctx.strokeStyle = "rgba(255,255,255,0.25)"; ctx.lineWidth = 2;
    windLines.forEach(l => { ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x, l.y + l.len); ctx.stroke(); });

    for(let i=0; i<15; i++) {
        let treeY = ((playerProgress / 6) + (i * 250)) % (canvas.height + 250) - 100;
        drawTree(canvas.width/2 + curve - 550, canvas.height - treeY);
        drawTree(canvas.width/2 + curve + 550, canvas.height - treeY);
    }

    for(let i=0; i<45; i++) {
        let y = canvas.height - (i * (canvas.height/40));
        let zD = playerProgress + (i * 80);
        let zC = (zD > 1500) ? Math.sin((zD - 1500) / 2500) * 230 : 0;
        ctx.fillStyle = (Math.floor(zD/150)%2==0) ? currentBiome.track1 : currentBiome.track2;
        ctx.fillRect(canvas.width/2 + zC - 200, y, 400, canvas.height/40 + 1);
        ctx.fillStyle = (Math.floor(zD/150)%2==0) ? currentBiome.border1 : currentBiome.border2;
        ctx.fillRect(canvas.width/2 + zC - 230, y, 30, canvas.height/40);
        ctx.fillRect(canvas.width/2 + zC + 200, y, 30, canvas.height/40);
        if(zD >= GOAL_DIST && zD < GOAL_DIST + 100) { ctx.fillStyle = (Math.floor(zD/25)%2==0) ? '#000' : '#fff'; ctx.fillRect(canvas.width/2 + zC - 200, y, 400, 20); }
        if(Math.abs(zD) < 300) { ctx.fillStyle='#fff'; ctx.fillRect(canvas.width/2 + zC - 200, y, 400, 10); }
    }

    particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 8, 8); });
    ctx.globalAlpha = 1.0;
    
    items.forEach(p => { if(p.active) { 
        let pY = (canvas.height - 150) - (p.progress - playerProgress); 
        if(pY > -100 && pY < canvas.height+100) { 
            ctx.fillStyle = (p.type === 'B'?'#f1c40f':(p.type === 'T'?'#00f2ff':(p.type === 'N'?'#ff6600':(p.type === 'S'?'#ff00ff':'#3dfc03')))); 
            ctx.fillRect(p.x - 25, pY - 25, 50, 50); ctx.fillStyle = '#000'; ctx.font="bold 24px Arial"; ctx.fillText(p.type, p.x-7, pY+7); } } 
    });

    allBullets.forEach(b => { 
        let bY = (canvas.height - 150) - (b.progress - playerProgress); 
        ctx.fillStyle = b.color; 
        if(b.isMissile) { ctx.fillRect(b.x-8, bY-25, 16, 50); ctx.fillStyle='#f00'; ctx.fillRect(b.x-5, bY+20, 10, 15); }
        else { ctx.fillRect(b.x - 3, bY - 30, 6, 60); }
    });

    racers.forEach(r => {
        let rY = (canvas.height - 150) - (r.progress - playerProgress);
        if(rY > -200 && rY < canvas.height + 200) drawF1Car(r.x, rY, r.color, r.stun, r.nitro > 0);
    });
    ctx.restore();
}

let tX = canvas.width/2, tY = canvas.height - 150;
canvas.addEventListener('touchstart', e => {
    toggleFullScreen(); // Activa pantalla completa al primer toque
    tX = e.touches[0].clientX - canvas.offsetLeft; tY = e.touches[0].clientY - canvas.offsetTop;
    if(gameState === "RACING" && (racers[0].ammo > 0 || racers[0].missiles > 0)) fire(racers[0]);
    if(gameState === "FINISHED") location.reload();
});
canvas.addEventListener('touchmove', e => { tX = e.touches[0].clientX - canvas.offsetLeft; tY = e.touches[0].clientY - canvas.offsetTop; });

// Soporte para Clic en PC para activar Fullscreen
canvas.addEventListener('mousedown', toggleFullScreen);

update();
</script>
</body>
</html>
