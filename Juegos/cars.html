<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Infinite Art GP - Setsu God Speed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; background: #222; margin: 0 auto; width: 100vw; height: 100vh; object-fit: contain; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; text-align: center; }
        #start-screen h1 { font-size: clamp(30px, 8vw, 60px); color: gold; margin: 0; text-shadow: 4px 4px #ff0000; }
        #play-btn { padding: 20px 60px; font-size: 25px; background: #f39c12; color: #000; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 10px #d35400; transition: 0.2s; }
        #hud { position: absolute; top: 15px; left: 15px; color: #fff; background: rgba(0,0,0,0.85); padding: 12px; border: 2px solid #f39c12; pointer-events: none; border-radius: 8px; z-index: 10; font-size: 14px; display: none; line-height: 1.4; }
        #msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 50px; text-align: center; text-shadow: 4px 4px #000; z-index: 20; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px; border: 4px solid gold; width: 85%; max-width: 650px; display: none; }
        .stat { color: #f39c12; font-weight: bold; }
        .vel { color: #00f2ff; font-size: 18px; }
        #fs-btn { position: absolute; bottom: 15px; right: 15px; width: 50px; height: 50px; background: rgba(255, 215, 0, 0.6); color: #000; border: 2px solid #fff; border-radius: 50%; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 30; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

<div id="start-screen">
    <h2>INFINITE ART GAMES</h2>
    <h1>INFINITE ART GP</h1>
    <p style="color: #888;">SETSU: 500 KM/H OVERLOAD</p>
    <button id="play-btn">P L A Y</button>
</div>

<div id="hud">
    <span class="stat">RANK:</span> <span id="rank">--</span>/10<br>
    <span class="stat">BALAS:</span> <span id="ammo">5</span> <span id="triple-ind" style="color:#00f2ff; display:none;">+T</span><br>
    <span class="stat">META:</span> <span id="dist">10000</span>km<br>
    <hr style="border:0; border-top:1px solid #444;">
    <span class="stat">VELOCIDAD:</span> <br><span id="hud-vel" class="vel">0</span> <span class="vel" style="font-size:10px">KM/H</span>
</div>

<div id="msg">3</div>
<button id="fs-btn">FS</button>
<canvas id="raceCanvas"></canvas>

<script>
const canvas = document.getElementById('raceCanvas');
const ctx = canvas.getContext('2d');
const fsBtn = document.getElementById('fs-btn');
const playBtn = document.getElementById('play-btn');
const startScreen = document.getElementById('start-screen');

// MOTOR DE AUDIO
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playShootSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(450, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.12);
}
function playHitSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const bufSize = audioCtx.sampleRate * 0.25;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    src.buffer = buf;
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
    src.connect(gain); gain.connect(audioCtx.destination);
    src.start();
}

const MAX_SPEED_BASE = 26.6; 
const NITRO_BOOST = 8.5;    
const CONVERSION_FACTOR = 15; 
const P_TYPES = ['B', 'T', 'N', 'S', 'M', 'E']; 
const TRACK_WIDTH_BASE = 600;
const CAR_SIZE_BOOST = 1.3;

let gameScale = 1.0;
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gameScale = Math.min(1.0, canvas.width / 800);
    if(racers[0]) racers[0].y = canvas.height * 0.82; 
}
window.addEventListener('resize', resize);

playBtn.addEventListener('click', () => {
    audioCtx.resume().then(() => {
        startScreen.style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        gameState = "COUNTDOWN";
        startCountdown();
    });
});

const GOAL_DIST = 100000; 
let playerProgress = 0, worldSpeed = 0, gameState = "MENU", timer = 3;
let allBullets = [], racers = [], items = [], particles = [], windLines = [], shockwaves = [];
let shake = 0; 

const biomes = [
    { name: "Forest", grass: "#2d5a27", track1: "#333", track2: "#222", border1: "#fff", border2: "#ff0", tree: "#1b3a1a", fog: "rgba(45,90,39,0.4)", type: "classic" },
    { name: "Autumn", grass: "#8e4420", track1: "#444", track2: "#333", border1: "#fff", border2: "#d35400", tree: "#5e2a14", fog: "rgba(142,68,32,0.4)", type: "classic" },
    { name: "Snow", grass: "#f0f0f0", track1: "#2c3e50", track2: "#34495e", border1: "#fff", border2: "#3498db", tree: "#ffffff", fog: "rgba(255,255,255,0.6)", type: "pine" },
    { name: "Night", grass: "#050510", track1: "#111", track2: "#000", border1: "#bc13fe", border2: "#000", tree: "#202040", fog: "rgba(0,0,0,0.9)", type: "neo" },
    { name: "Inferno", grass: "#1a1a1a", track1: "#3e2723", track2: "#2d1b10", border1: "#ff4400", border2: "#000", tree: "#ff6600", fog: "rgba(255,68,0,0.6)", type: "pine" }
];
let currentBiome = biomes[Math.floor(Math.random() * biomes.length)];
const racerColors = ['#f39c12', '#9b59b6', '#3498db', '#1abc9c', '#f1c40f', '#ecf0f1', '#e74c3c', '#2c3e50', '#27ae60'];

function init() {
    resize();
    racers = [{ id: 0, x: canvas.width / 2, y: canvas.height * 0.82, progress: 0, color: '#e74c3c', isPlayer: true, stun: 0, invul: 0, shieldHealth: 0, ammo: 5, gunType: "NORMAL", tripleCharges: 0, baseSpeed: MAX_SPEED_BASE, nitro: 0, missiles: 0, hitCounter: 0, angle: 0 }];
    for(let i=0; i<9; i++) {
        let row = Math.floor(i / 2); let side = (i % 2 === 0) ? -1 : 1;
        let isBoss = (currentBiome.name === "Inferno" && i === 4); 
        racers.push({ 
            id: i+1, x: canvas.width / 2 + (side * 120 * gameScale), progress: 300 + (row * 350), 
            color: isBoss ? "#000000" : racerColors[i % racerColors.length], 
            isPlayer: false, stun: 0, invul: 0, shieldHealth: 0, ammo: 5, gunType: "NORMAL", tripleCharges: 0,
            baseSpeed: isBoss ? 33.5 : (MAX_SPEED_BASE + (Math.random() * 2 - 1)), // SETSU 500+ KM/H
            isInfernoBoss: isBoss, nitro: 0, motorFlux: 0.5 + Math.random(), shootTimer: 30, missiles: 0, hitCounter: 0, angle: 0 
        });
    }
    const supplyZones = [GOAL_DIST * 0.15, GOAL_DIST * 0.50, GOAL_DIST * 0.75];
    supplyZones.forEach(zoneProg => {
        for(let j=0; j<6; j++) items.push({ type: P_TYPES[Math.floor(Math.random() * P_TYPES.length)], offsetX: (j - 2.5) * 115, progress: zoneProg, active: true, timer: 0 });
    });
    for(let i=0; i<80; i++) windLines.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, len: 100 + Math.random() * 300, opacity: 0.1 + Math.random() * 0.4, isCenter: Math.random() > 0.7 });
}
init();

function startCountdown() {
    const msgBox = document.getElementById('msg');
    msgBox.style.display = 'block';
    let countdown = setInterval(() => {
        timer--;
        if(timer > 0) msgBox.innerText = timer;
        else if(timer === 0) msgBox.innerText = "¡DALE!";
        else { msgBox.style.display = 'none'; clearInterval(countdown); gameState = "RACING"; }
    }, 1000);
}

function getTrackCurve(prog) { return (prog > 1500) ? Math.sin((prog - 1500) / 2500) * 280 : 0; }

function createExplosion(x, y, color, count=15) {
    for(let i=0; i<count; i++) particles.push({ x: x, y: y, vX: (Math.random() - 0.5) * 25, vY: (Math.random() - 0.5) * 25, life: 1.2, color: color });
}

function drawF1Car(r, yPos) {
    const { x, color, stun, invul, shieldHealth, nitro, isPlayer, angle, isInfernoBoss } = r;
    if (invul > 0 && Math.floor(Date.now() / 50) % 2 === 0) return;
    ctx.save(); ctx.translate(x, yPos); ctx.scale(gameScale * CAR_SIZE_BOOST, gameScale * CAR_SIZE_BOOST); ctx.rotate(angle);
    if (shieldHealth > 0) {
        ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = shieldHealth * 2.5;
        ctx.beginPath(); ctx.arc(0, 0, 70, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = `rgba(0, 242, 255, ${shieldHealth * 0.1})`; ctx.fill();
    }
    const currentVel = isPlayer ? worldSpeed : r.baseSpeed;
    const isMoving = currentVel > 2 && stun <= 0; const wheelAngle = (Date.now() / (1000 / (currentVel || 1))) % (Math.PI * 2);
    ctx.strokeStyle = isInfernoBoss ? '#ff0000' : '#888'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-12, -17); ctx.lineTo(-32, -23); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, -17); ctx.lineTo(32, -23); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-12, 23); ctx.lineTo(-38, 23); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, 23); ctx.lineTo(38, 23); ctx.stroke();
    ctx.fillStyle = isInfernoBoss ? '#300' : '#111';
    [[-32, -34], [32, -34], [-38, 10], [38, 10]].forEach(([wx, wy]) => {
        if(isInfernoBoss) { ctx.shadowBlur = 15; ctx.shadowColor = "red"; ctx.fillStyle = "#ff0000"; }
        ctx.fillRect(wx - (wy < 0 ? 7 : 8), wy, wy < 0 ? 14 : 16, wy < 0 ? 22 : 26); ctx.shadowBlur = 0;
        if(isMoving) { ctx.fillStyle = isInfernoBoss ? 'rgba(255,100,100,0.8)' : 'rgba(255,255,255,0.3)'; ctx.fillRect(wx - 5, wy + Math.sin(wheelAngle)*10 + 10, 10, 2); ctx.fillStyle = '#111'; }
    });
    if(nitro > 0) {
        ctx.fillStyle = isInfernoBoss ? (Math.random() > 0.5 ? '#ff0000' : '#ff6600') : (Math.random() > 0.5 ? '#00f2ff' : '#ffffff');
        for(let i=0; i<15; i++) { ctx.beginPath(); let size = 15 + Math.random()*25; ctx.arc(Math.random()*24-12, 45 + Math.random()*35, size/2, 0, Math.PI*2); ctx.fill(); }
    }
    ctx.fillStyle = color; ctx.beginPath(); ctx.moveTo(0, -55); ctx.lineTo(13, -15); ctx.lineTo(15, 30); ctx.lineTo(-15, 30); ctx.lineTo(-13, -15); ctx.fill();
    ctx.fillStyle = '#222'; ctx.fillRect(-32, -50, 64, 6); ctx.fillStyle = '#111'; ctx.fillRect(-38, 32, 76, 10);
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffff00'; ctx.beginPath(); ctx.arc(0, -2, 6, 0, Math.PI*2); ctx.fill();
    if(stun > 0) { ctx.fillStyle='white'; ctx.font="bold 18px Arial"; ctx.fillText("X X", -14, -10); }
    ctx.restore();
}

function fire(r) {
    if(r.ammo <= 0 && r.missiles <= 0) return;
    let sortedRacers = [...racers].sort((a,b) => b.progress - a.progress);
    playShootSound(); 
    if(r.missiles > 0) {
        let target = sortedRacers.find(res => res.id !== r.id && res.stun <= 0);
        if(!target) target = (sortedRacers[0].id !== r.id) ? sortedRacers[0] : sortedRacers[1];
        allBullets.push({ x: r.x, progress: r.progress + 150, dy: MAX_SPEED_BASE + 40, ownerId: r.id, color: '#ff0000', isMissile: true, target: target });
        r.missiles--; 
    } else if (r.ammo > 0) {
        let victims = racers.filter(res => res.id !== r.id && (res.progress - r.progress) > 0 && (res.progress - r.progress) < 4000 && res.stun <= 0 && Math.abs(r.x - res.x) < (250 * gameScale));
        if(victims.length > 0 || r.isPlayer) {
            const isTriple = r.gunType === "TRIPLE"; const bColor = isTriple ? '#00f2ff' : '#fff';
            if (isTriple) { 
                allBullets.push({ x: r.x - (35 * gameScale), progress: r.progress + 100, dy: 130, ownerId: r.id, color: bColor }); 
                allBullets.push({ x: r.x + (35 * gameScale), progress: r.progress + 100, dy: 130, ownerId: r.id, color: bColor }); 
                r.tripleCharges--; if(r.tripleCharges <= 0) r.gunType = "NORMAL";
            }
            allBullets.push({ x: r.x, progress: r.progress + 150, dy: 130, ownerId: r.id, color: bColor });
            r.ammo--;
        }
    }
}

function update() {
    if(gameState === "RACING") {
        let sorted = [...racers].sort((a,b) => b.progress - a.progress);
        let leaderP = sorted[0].progress; let pRank = sorted.findIndex(r => r.id === 0) + 1;
        let playerTrackX = canvas.width/2 + getTrackCurve(playerProgress) * gameScale;
        let trackLimit = (TRACK_WIDTH_BASE / 2) * gameScale; let playerOff = Math.abs(racers[0].x - playerTrackX) > trackLimit;
        
        let baseT = racers[0].baseSpeed; 
        if(racers[0].nitro > 0) { baseT += NITRO_BOOST; racers[0].nitro--; shake = 10; }
        if(playerOff) { worldSpeed += (4.5 - worldSpeed) * 0.15; if(worldSpeed > 2) createExplosion(racers[0].x, racers[0].y + 40, '#5d4037', 2); } 
        else { 
            // LIMITADOR DE VELOCIDAD JUGADOR: Maximo 440 KM/H sin nitro
            let rubberBand = Math.min((pRank > 2 ? (leaderP - playerProgress)/150 : 0), 2.7);
            worldSpeed += (baseT + rubberBand - worldSpeed) * 0.1; 
        }
        
        if(racers[0].stun > 0) { worldSpeed = 0; racers[0].stun--; }
        if(racers[0].invul > 0) racers[0].invul--;
        playerProgress += worldSpeed; racers[0].progress = playerProgress;
        racers[0].angle += ((tX - racers[0].x) * 0.005 - racers[0].angle) * 0.1; racers[0].x += (tX - racers[0].x) * 0.22;
        
        document.getElementById('hud-vel').innerText = Math.floor(worldSpeed * CONVERSION_FACTOR);
        document.getElementById('dist').innerText = Math.max(0, Math.floor((GOAL_DIST - playerProgress)/10));
        document.getElementById('ammo').innerText = racers[0].ammo;
        document.getElementById('triple-ind').style.display = (racers[0].gunType === "TRIPLE") ? "inline" : "none";

        windLines.forEach(l => { l.y += worldSpeed * 5 + 30; if(l.y > canvas.height) { l.y = -l.len; l.x = Math.random() * canvas.width; l.opacity = 0.1 + Math.random() * 0.4; } });
        particles.forEach(p => { p.x += p.vX; p.y += p.vY; p.life -= 0.02; }); particles = particles.filter(p => p.life > 0);
        shockwaves.forEach(s => { s.r += 20; s.life -= 0.02; }); shockwaves = shockwaves.filter(s => s.life > 0);
        allBullets.forEach(b => { if(b.isMissile && b.target) { b.x += (b.target.x - b.x) * 0.35; b.progress += b.dy; if(Math.random()>0.05) particles.push({x: b.x, y: (racers[0].y - (b.progress - playerProgress)), vX:(Math.random()-0.5)*6, vY:8, life:0.8, color:'#ff4400'}); } else { b.progress += b.dy; } });
        
        racers.forEach(r => {
            if(!r.isPlayer) {
                let rRank = sorted.findIndex(res => res.id === r.id) + 1;
                if(r.isInfernoBoss && rRank > 3) { r.nitro = 100; }
                if(r.invul > 0) r.invul--;
                if(r.stun > 0) { r.stun--; }
                else {
                    let rTrackX = canvas.width/2 + getTrackCurve(r.progress) * gameScale; let rOff = Math.abs(r.x - rTrackX) > trackLimit;
                    let speedMult = rOff ? 0.15 : 1.0; 
                    r.progress += (r.baseSpeed + (r.nitro > 0 ? NITRO_BOOST + 3 : 0)) * speedMult;
                    if(r.nitro > 0) r.nitro--;
                    let laneOffset = (rOff) ? 0 : (r.id % 3 - 1) * 150 * gameScale;
                    let targetX = rTrackX + laneOffset; 
                    r.angle = (targetX - r.x) * 0.002; 
                    r.x += (targetX - r.x) * (rOff ? 0.25 : 0.09);
                    if(sorted[0].id !== r.id || r.missiles > 0) { r.shootTimer--; if(r.shootTimer <= 0) { fire(r); r.shootTimer = (r.ammo > 3) ? 20 : 60; } }
                }
            }
        });
        racers.forEach(r => {
            let rY = r.isPlayer ? racers[0].y : racers[0].y - (r.progress - playerProgress);
            allBullets.forEach(b => { if(b.ownerId !== r.id && r.invul <= 0 && Math.abs(r.x - b.x) < (85 * gameScale) && Math.abs(r.progress - b.progress) < 150) { 
                playHitSound(); if (r.shieldHealth > 0) { r.shieldHealth--; r.invul = 60; b.progress = -999999; createExplosion(r.x, rY, '#00f2ff', 20); } 
                else { r.stun = b.isMissile ? 180 : 120; r.invul = 150; createExplosion(r.x, rY, b.isMissile ? '#ff2200' : b.color, 45); b.progress = -9999999; if(r.isPlayer) shake = 50; }
            } });
            racers.forEach(other => { if(r.id !== other.id && r.invul <= 0 && Math.abs(r.progress - other.progress) < 130 && Math.abs(r.x - other.x) < (100 * gameScale)) { 
                let f = (r.x < other.x) ? -20 : 20; r.x += f; other.x -= f; if(r.isPlayer) { worldSpeed *= 0.5; playHitSound(); }
                if(r.shieldHealth > 0) { r.shieldHealth--; r.invul = 40; } 
                else { r.hitCounter += 15; if(r.hitCounter > 40) { r.stun = 120; r.hitCounter = 0; createExplosion(r.x, rY, '#ff0000', 30); } }
            } });
            items.forEach(p => { if(!p.active) { p.timer--; if(p.timer <= 0) { p.active = true; p.type = P_TYPES[Math.floor(Math.random()*P_TYPES.length)]; } } 
                else if(r.stun <= 0 && Math.abs(r.progress - p.progress) < 250) { 
                    let iX = (canvas.width / 2 + getTrackCurve(p.progress) * gameScale) + p.offsetX * gameScale; 
                    if(Math.abs(r.x - iX) < (75 * gameScale)) { if(p.type==='B') r.ammo += 5; if(p.type==='T') { r.gunType = "TRIPLE"; r.tripleCharges = 6; } if(p.type==='N') r.nitro = 300; if(p.type==='M') r.missiles += 3; if(p.type==='E') r.shieldHealth = 3;
                        if(p.type==='S') { shockwaves.push({x:r.x, y:rY, r:15, life:1}); racers.forEach(t => { if(t.id!==r.id && t.invul <= 0 && t.shieldHealth <= 0 && Math.abs(r.progress-t.progress) < 1200) { t.stun=180; t.invul=150; } else if(t.shieldHealth > 0 && t.id!==r.id && Math.abs(r.progress-t.progress) < 1200) { t.shieldHealth--; t.invul=60; } }); } 
                        p.active = false; p.timer = 400; 
                    } 
                } 
            });
        });
        document.getElementById('rank').innerText = pRank;
        if(playerProgress >= GOAL_DIST) { 
            gameState = "FINISHED"; 
            let winMsg = (sorted[0].id === 0) ? "🏁 ¡HAS GANADO! 🏁" : (sorted[0].isInfernoBoss ? "🏁 SETSU HA GANADO 🏁" : "🏁 FIN DE CARRERA 🏁");
            let winColor = (sorted[0].isInfernoBoss) ? "#ff0000" : "gold";
            document.getElementById('msg').style.display = "block"; document.getElementById('msg').style.color = winColor;
            document.getElementById('msg').innerHTML = `${winMsg}<br><span style="font-size:30px">POSICIÓN: ${pRank}</span>`; 
        }
        if(shake > 0) shake *= 0.88;
    }
    draw(); requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save();
    if(shake > 0.1) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    let curve = getTrackCurve(playerProgress) * gameScale; ctx.translate(-curve * 0.7, 0);
    ctx.fillStyle = currentBiome.grass; ctx.fillRect(-canvas.width * 2, 0, canvas.width * 5, canvas.height);
    for(let i=0; i<30; i++) {
        let treeY = ( (playerProgress / 6) + (i * 250) ) % (canvas.height + 250); let xOff = getTrackCurve(playerProgress + (canvas.height - treeY)*2) * gameScale;
        let sideX = 650 * gameScale; ctx.fillStyle = "#5d4037"; ctx.fillRect(canvas.width/2 + xOff - sideX - 5, treeY - 20, 10, 20); ctx.fillRect(canvas.width/2 + xOff + sideX - 5, treeY - 20, 10, 20); 
        ctx.fillStyle = currentBiome.tree;
        if(currentBiome.type === "pine") { [0, 25, 50].forEach(offset => { ctx.beginPath(); ctx.moveTo(canvas.width/2 + xOff - sideX, treeY - 100 + offset); ctx.lineTo(canvas.width/2 + xOff - sideX + 50 - offset/2, treeY - 30 + offset); ctx.lineTo(canvas.width/2 + xOff - sideX - 50 + offset/2, treeY - 30 + offset); ctx.fill(); ctx.beginPath(); ctx.moveTo(canvas.width/2 + xOff + sideX, treeY - 100 + offset); ctx.lineTo(canvas.width/2 + xOff + sideX + 50 - offset/2, treeY - 30 + offset); ctx.lineTo(canvas.width/2 + xOff + sideX - 50 + offset/2, treeY - 30 + offset); ctx.fill(); }); } 
        else if(currentBiome.type === "neo") { ctx.fillRect(canvas.width/2 + xOff - sideX - 20, treeY - 150, 40, 150); ctx.fillRect(canvas.width/2 + xOff + sideX - 20, treeY - 150, 40, 150); } 
        else { [ [-20, -40], [20, -40], [0, -70] ].forEach(([ox, oy]) => { ctx.beginPath(); ctx.arc(canvas.width/2+xOff-sideX+ox, treeY+oy, 35, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(canvas.width/2+xOff+sideX+ox, treeY+oy, 35, 0, Math.PI*2); ctx.fill(); }); }
    }
    for(let i=0; i<45; i++) {
        let y = canvas.height - (i * (canvas.height/35)); let zD = playerProgress + (i * 90); let zC = getTrackCurve(zD) * gameScale;
        let trackW = TRACK_WIDTH_BASE * gameScale; ctx.fillStyle = (Math.floor(zD/150)%2==0) ? currentBiome.track1 : currentBiome.track2;
        ctx.fillRect(canvas.width / 2 + zC - trackW/2, y, trackW, canvas.height/35 + 1);
        ctx.fillStyle = (Math.floor(zD/150)%2==0) ? currentBiome.border1 : currentBiome.border2; ctx.fillRect(canvas.width/2+zC-trackW/2 - 30*gameScale, y, 30*gameScale, canvas.height/35); ctx.fillRect(canvas.width/2+zC+trackW/2, y, 30*gameScale, canvas.height/35);
        ctx.fillStyle = "rgba(255,255,255,0.08)"; ctx.fillRect(canvas.width/2 + zC - 1, y, 2, canvas.height/35);
        if(Math.abs(zD) < 400 || (zD >= GOAL_DIST && zD < GOAL_DIST + 300)) { ctx.fillStyle = '#fff'; ctx.fillRect(canvas.width/2+zC-trackW/2, y, trackW, 20); }
    }
    let grd = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.45); grd.addColorStop(0, currentBiome.fog); grd.addColorStop(1, "rgba(0,0,0,0)"); ctx.fillStyle = grd; ctx.fillRect(-canvas.width, 0, canvas.width*3, canvas.height * 0.45);
    windLines.forEach(l => { let distFromCenter = Math.abs(l.x - canvas.width/2) / (canvas.width/2); ctx.strokeStyle = `rgba(255,255,255,${l.opacity * (l.isCenter ? 0.2 : distFromCenter)})`; ctx.lineWidth = l.isCenter ? 1 : 2; ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x, l.y + l.len * (worldSpeed/20)); ctx.stroke(); });
    items.forEach(p => { if(p.active) { let pY = racers[0].y - (p.progress - playerProgress); if(pY > -100 && pY < canvas.height+100) { let pX = (canvas.width / 2 + getTrackCurve(p.progress) * gameScale) + p.offsetX * gameScale; ctx.fillStyle = (p.type==='B'?'#f1c40f':(p.type==='T'?'#00f2ff':(p.type==='N'?'#ff6600':(p.type==='S'?'#ff00ff':(p.type==='E'?'#2ecc71':'#3dfc03'))))); ctx.fillRect(pX-35*gameScale, pY-35*gameScale, 70*gameScale, 70*gameScale); ctx.fillStyle='#000'; ctx.font=`bold ${30*gameScale}px Arial`; ctx.fillText(p.type, pX-12*gameScale, pY+12*gameScale); } } });
    allBullets.forEach(b => { let bY = racers[0].y - (b.progress - playerProgress); ctx.fillStyle = b.color; if(b.isMissile) { ctx.fillRect(b.x-15*gameScale, bY-45*gameScale, 30*gameScale, 90*gameScale); ctx.fillStyle = '#ff6600'; ctx.fillRect(b.x-10*gameScale, bY+45*gameScale, 20*gameScale, 25*gameScale); } else { ctx.fillRect(b.x-7*gameScale, bY-65*gameScale, 14*gameScale, 130*gameScale); } });
    racers.forEach(r => { let rY = r.isPlayer ? racers[0].y : racers[0].y - (r.progress - playerProgress); if(rY > -200 && rY < canvas.height + 200) drawF1Car(r, rY); });
    shockwaves.forEach(s => { ctx.strokeStyle=`rgba(255, 0, 255, ${s.life})`; ctx.lineWidth=14*gameScale; ctx.beginPath(); ctx.arc(s.x, s.y, s.r*gameScale, 0, Math.PI*2); ctx.stroke(); });
    particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 10*gameScale, 10*gameScale); });
    ctx.restore();
}

let tX = window.innerWidth / 2;
const handleIn = (e) => { 
    tX = (e.touches ? e.touches[0].clientX : e.clientX); 
    if(gameState === "RACING" && racers[0].stun <= 0) fire(racers[0]); 
    if(gameState === "FINISHED") location.reload(); 
};
canvas.addEventListener('touchstart', handleIn); canvas.addEventListener('mousedown', handleIn);
canvas.addEventListener('touchmove', (e) => { tX = e.touches[0].clientX; });
canvas.addEventListener('mousemove', (e) => { if(e.buttons > 0) { tX = e.clientX; } });

update();
</script>
</body>
