<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Infinite Art GP - F1 Battle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; margin: 0 auto; background: #222; border-left: 5px solid #f39c12; border-right: 5px solid #f39c12; }
        #hud { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.9); padding: 15px; border: 3px solid #f39c12; pointer-events: none; border-radius: 12px; z-index: 10; }
        #msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 60px; text-align: center; text-shadow: 6px 6px #000; z-index: 20; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px; border: 5px solid gold; width: 70%; display: block; }
        .stat { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

<div id="hud">
    <span class="stat">RANK:</span> <span id="rank">--</span>/10<br>
    <span class="stat">AMMO:</span> <span id="ammo">5</span><br>
    <span class="stat">META:</span> <span id="dist">5000</span>km
</div>
<div id="msg">3</div>
<canvas id="raceCanvas"></canvas>

<script>
const canvas = document.getElementById('raceCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth > 900 ? 900 : window.innerWidth;
canvas.height = window.innerHeight;

const GOAL_DIST = 50000; 
let playerProgress = 0, worldSpeed = 0, gameState = "COUNTDOWN", timer = 3;
let allBullets = [], racers = [], items = [], particles = [], windLines = [];
let shake = 0; 

const biomes = [
    { name: "Monaco", grass: "#1b5e20", track1: "#444", track2: "#333", border1: "#eee", border2: "#d32f2f", tree: "#145514" },
    { name: "Cyber", grass: "#1a0033", track1: "#111", track2: "#050505", border1: "#ff00ff", border2: "#00f2ff", tree: "#220044" }
];
let currentBiome = biomes[0];
const racerColors = ['#f39c12', '#9b59b6', '#3498db', '#1abc9c', '#f1c40f', '#ecf0f1', '#e74c3c', '#2c3e50', '#27ae60'];

function init() {
    currentBiome = biomes[Math.floor(Math.random() * biomes.length)];
    const B_SPEED = 12.5;
    // Jugador (ID 0)
    racers = [{ id: 0, x: canvas.width/2, progress: 0, color: '#e74c3c', isPlayer: true, stun: 0, ammo: 5, gunType: "NORMAL", baseSpeed: B_SPEED, nitro: 0, missiles: 0 }];
    
    // IAs en parilla compacta para que se vean de una
    for(let i=0; i<9; i++) {
        racers.push({
            id: i+1, 
            x: canvas.width/2 + (i % 3 - 1) * 150, 
            progress: (i + 1) * 200, 
            color: racerColors[i % racerColors.length], 
            isPlayer: false, stun: 0, ammo: 5, gunType: "NORMAL",
            baseSpeed: B_SPEED + (Math.random() * 2 - 1), 
            motorFlux: 0.5 + Math.random(), 
            shootTimer: 120, nitro: 0, missiles: 0
        });
    }

    const spots = [8000, 16000, 24000, 32000, 40000];
    const types = ['B', 'T', 'N', 'S', 'M', 'B'];
    spots.forEach(dist => {
        for(let j=0; j<6; j++) {
            items.push({ type: types[j], x: (canvas.width/2 - 250) + (j * 100), progress: dist, active: true });
        }
    });
    for(let i=0; i<25; i++) windLines.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, len: 40 + Math.random()*60 });
}
init();

function drawF1Car(x, y, color, stun, isNitro) {
    ctx.save(); ctx.translate(x, y);
    // Sombras
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(-30, 15, 60, 40);
    // Ruedas
    ctx.fillStyle = '#111';
    ctx.fillRect(-40, -30, 14, 22); ctx.fillRect(26, -30, 14, 22); // Delante
    ctx.fillRect(-42, 10, 16, 26);  ctx.fillRect(26, 10, 16, 26);  // Atras
    // Chasis (Nariz)
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.moveTo(0, -50); ctx.lineTo(12, -10); ctx.lineTo(14, 30); ctx.lineTo(-14, 30); ctx.lineTo(-12, -10); ctx.fill();
    // Pontones laterales
    ctx.fillStyle = shadeColor(color, -20);
    ctx.fillRect(-28, -5, 15, 25); ctx.fillRect(13, -5, 15, 25);
    // Alerones
    ctx.fillStyle = '#222'; ctx.fillRect(-38, -48, 76, 6); // Frontal
    ctx.fillStyle = '#111'; ctx.fillRect(-42, 32, 84, 10); // Trasero
    // Piloto
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffff00'; ctx.beginPath(); ctx.arc(0, -2, 6, 0, Math.PI*2); ctx.fill();
    if(stun > 0) { ctx.fillStyle='white'; ctx.font="bold 16px Arial"; ctx.fillText("X X", -12, -10); }
    if(isNitro) { ctx.fillStyle='#00f2ff'; ctx.beginPath(); ctx.arc(0, 45, 12, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
}

function shadeColor(color, percent) {
    let num = parseInt(color.replace("#",""),16), amt = Math.round(2.55 * percent), R = (num >> 16) + amt, G = (num >> 8 & 0x00FF) + amt, B = (num & 0x0000FF) + amt;
    return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
}

function fire(r) {
    const isTriple = r.gunType === "TRIPLE";
    const bColor = isTriple ? '#00f2ff' : '#fff';
    if(r.missiles > 0) {
        let target = null; let minDist = 99999;
        racers.forEach(o => { if(o.id !== r.id && o.progress > r.progress) { let d = o.progress - r.progress; if(d < minDist) { minDist = d; target = o; } } });
        allBullets.push({ x: r.x, progress: r.progress + 120, dy: 50, ownerId: r.id, color: '#3dfc03', isMissile: true, target: target });
        r.missiles--;
    } else {
        if (isTriple) {
            allBullets.push({ x: r.x - 20, progress: r.progress + 100, dy: 70, ownerId: r.id, color: bColor });
            allBullets.push({ x: r.x + 20, progress: r.progress + 100, dy: 70, ownerId: r.id, color: bColor });
        }
        allBullets.push({ x: r.x, progress: r.progress + 120, dy: 70, ownerId: r.id, color: bColor });
        r.ammo--;
    }
}

// Semáforo Corregido
const msgBox = document.getElementById('msg');
let countdown = setInterval(() => {
    timer--;
    if(timer > 0) msgBox.innerText = timer;
    else if(timer === 0) { msgBox.innerText = "¡FUERA!"; gameState = "RACING"; }
    else { msgBox.style.display = "none"; clearInterval(countdown); }
}, 1000);

function update() {
    if(gameState === "RACING") {
        let sorted = [...racers].sort((a,b) => b.progress - a.progress);
        let playerRank = sorted.findIndex(r => r.id === 0) + 1;
        let leaderP = sorted[0].progress;

        let curve = (playerProgress > 1500) ? Math.sin((playerProgress - 1500) / 2500) * 230 : 0;
        let targetSpeed = (canvas.height - tY) / 20;
        
        if(racers[0].nitro > 0) { targetSpeed += 25; racers[0].nitro--; shake = 4; }
        if (Math.abs(racers[0].x - (canvas.width/2 + curve)) > 195) targetSpeed *= 0.3;
        if (playerRank > 2) targetSpeed += (leaderP - playerProgress) / 120; 

        worldSpeed += (targetSpeed - worldSpeed) * 0.12;
        if(racers[0].stun > 0) { worldSpeed *= 0.2; racers[0].stun--; shake = 6; }
        
        playerProgress += worldSpeed;
        racers[0].progress = playerProgress;
        racers[0].x += (tX - racers[0].x) * 0.2;

        windLines.forEach(l => { l.y += worldSpeed * 3 + 20; if(l.y > canvas.height) { l.y = -100; l.x = Math.random() * canvas.width; } });
        allBullets.forEach((b, i) => {
            if(b.isMissile && b.target) { b.x += (b.target.x - b.x) * 0.1; b.progress += b.dy; }
            else { b.progress += b.dy; }
            if(Math.abs(b.progress - playerProgress) > 5000) allBullets.splice(i, 1);
        });

        racers.forEach(r => {
            if(!r.isPlayer && r.stun <= 0) {
                let rankIA = sorted.findIndex(rac => rac.id === r.id) + 1;
                r.progress += r.baseSpeed + (rankIA > 3 ? (leaderP - r.progress) / 180 : 0) + (r.nitro > 0 ? 20 : 0);
                if(r.nitro > 0) r.nitro--;
                if(r.ammo > 0 && Math.abs(r.x - racers[0].x) < 60 && racers[0].progress > r.progress) { r.shootTimer--; if(r.shootTimer <= 0) { fire(r); r.shootTimer = 150; } }
                let rC = (r.progress > 1500) ? Math.sin((r.progress - 1500) / 2500) * 230 : 0;
                r.x += ((canvas.width/2 + rC) - r.x) * 0.06;
            }
        });

        // Colisiones
        racers.forEach(r => {
            allBullets.forEach((b, bi) => { if(b.ownerId !== r.id && Math.abs(r.x - b.x) < 50 && Math.abs(r.progress - b.progress) < 130) { r.stun = 120; allBullets.splice(bi, 1); if(r.isPlayer) shake = 20; } });
            items.forEach(p => { if(p.active && Math.abs(r.x - p.x) < 60 && Math.abs(r.progress - p.progress) < 120) { if(p.type === 'B') r.ammo += 5; if(p.type === 'T') r.gunType = "TRIPLE"; if(p.type === 'N') r.nitro = 150; p.active = false; } });
        });

        document.getElementById('rank').innerText = playerRank;
        document.getElementById('ammo').innerText = racers[0].ammo + (racers[0].missiles > 0 ? " +M" : "");
        document.getElementById('dist').innerText = Math.max(0, Math.floor((GOAL_DIST - playerProgress)/10));
        if(playerProgress >= GOAL_DIST) { gameState = "FINISHED"; msgBox.style.display = "block"; msgBox.innerHTML = "¡FINAL! " + (playerRank === 1 ? "🏆" : ""); }
        if(shake > 0) shake *= 0.85;
    }
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    if(shake > 0.1) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    let curve = (playerProgress > 1500) ? Math.sin((playerProgress - 1500) / 2500) * 230 : 0;
    ctx.translate(-curve * 0.7, 0);

    ctx.fillStyle = currentBiome.grass; ctx.fillRect(-2000, 0, 5000, canvas.height);
    ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 2;
    windLines.forEach(l => { ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x, l.y + l.len); ctx.stroke(); });

    for(let i=0; i<45; i++) {
        let y = canvas.height - (i * (canvas.height/40));
        let zD = playerProgress + (i * 80);
        let zC = (zD > 1500) ? Math.sin((zD - 1500) / 2500) * 230 : 0;
        ctx.fillStyle = (Math.floor(zD/150)%2==0) ? currentBiome.track1 : currentBiome.track2;
        ctx.fillRect(canvas.width/2 + zC - 200, y, 400, canvas.height/40 + 1);
        ctx.fillStyle = (Math.floor(zD/150)%2==0) ? currentBiome.border1 : currentBiome.border2;
        ctx.fillRect(canvas.width/2 + zC - 230, y, 30, canvas.height/40);
        ctx.fillRect(canvas.width/2 + zC + 200, y, 30, canvas.height/40);
        if(Math.abs(zD) < 300) { ctx.fillStyle='#fff'; ctx.fillRect(canvas.width/2 + zC - 200, y, 400, 10); }
    }

    items.forEach(p => { if(p.active) { let pY = (canvas.height - 150) - (p.progress - playerProgress); if(pY > -100 && pY < canvas.height+100) { ctx.fillStyle = '#f1c40f'; ctx.fillRect(p.x - 20, pY - 20, 40, 40); ctx.fillStyle = '#000'; ctx.font="bold 20px Arial"; ctx.fillText(p.type, p.x-7, pY+7); } } });
    allBullets.forEach(b => { let bY = (canvas.height - 150) - (b.progress - playerProgress); ctx.fillStyle = b.color; ctx.fillRect(b.x - 3, bY - 30, 6, 60); });

    racers.forEach(r => {
        let rY = (canvas.height - 150) - (r.progress - playerProgress);
        if(rY > -200 && rY < canvas.height + 200) drawF1Car(r.x, rY, r.color, r.stun, r.nitro > 0);
    });
    ctx.restore();
}

// Controles Móviles
let tX = canvas.width/2, tY = canvas.height - 150;
canvas.addEventListener('touchstart', e => {
    tX = e.touches[0].clientX - canvas.offsetLeft;
    tY = e.touches[0].clientY - canvas.offsetTop;
    if(gameState === "RACING" && (racers[0].ammo > 0 || racers[0].missiles > 0)) fire(racers[0]);
    if(gameState === "FINISHED") location.reload();
});
canvas.addEventListener('touchmove', e => { tX = e.touches[0].clientX - canvas.offsetLeft; tY = e.touches[0].clientY - canvas.offsetTop; });

update();
</script>
</body>
</html>
