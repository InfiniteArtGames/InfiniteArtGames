<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Infinite Art Games - Shadow & Light</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }
        #logo-container {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; visibility: hidden; z-index: 10; width: 95%;
        }
        #logo-text {
            color: #fff; font-size: 5vw; letter-spacing: 2vw;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            margin: 0; white-space: nowrap;
        }
        .glitch { animation: glitch-anim 0.2s linear infinite; }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); color: #0ff; }
            40% { transform: translate(3px, -2px); color: #fff; }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div id="logo-container"><h1 id="logo-text">INFINITE ART GAMES</h1></div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const logoContainer = document.getElementById('logo-container');

let w, h, centerX, centerY;
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    centerX = w / 2; centerY = h / 2;
}
window.addEventListener('resize', resize);
resize();

let time = 0;
const duration = 8500;
let tracers = [], expParticles = [], sword = { y: -1000, v: 0, active: false, landed: false, shake: 0 };

function init() {
    // Sét-su (Luz Infinita)
    tracers.push({
        t: 0, speed: 0.06, dir: 1, history: [],
        color: '#fff', glow: '#00ffff', type: 'light'
    });
    // Setsu (Vacío Animal) - Ahora con un gris espectral para visibilidad
    tracers.push({
        t: Math.PI, speed: 0.06, dir: -1, history: [],
        color: '#000', glow: '#444', type: 'dark'
    });
}

function getLemniscata(t, scale) {
    const d = Math.pow(Math.sin(t), 2) + 1;
    return { x: (scale * Math.cos(t)) / d, y: (scale * Math.sin(t) * Math.cos(t)) / d };
}

function draw() {
    // Efecto de rastro persistente elegante
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(0, 0, w, h);

    const progress = time / duration;
    const scaleInf = Math.min(w, h) * 0.38;

    if (progress < 0.45) {
        tracers.forEach(tr => {
            tr.t += tr.speed * tr.dir;
            const pos = getLemniscata(tr.t, scaleInf);
            const x = centerX + pos.x, y = centerY + pos.y;
            tr.history.push({x, y});
            if (tr.history.length > 30) tr.history.shift();

            // DIBUJO DE ESTELA "PRO"
            tr.history.forEach((h, idx) => {
                const ratio = idx / tr.history.length;
                ctx.beginPath();
                ctx.arc(h.x, h.y, tr.type === 'light' ? ratio * 8 : ratio * 12, 0, Math.PI * 2);
                
                if (tr.type === 'light') {
                    ctx.fillStyle = `rgba(0, 255, 255, ${ratio * 0.3})`;
                } else {
                    // El "Vacío": un rastro de partículas oscuras que se desvanecen
                    ctx.fillStyle = `rgba(100, 100, 100, ${ratio * 0.15})`;
                }
                ctx.fill();
            });

            // NÚCLEO DE LA PARTÍCULA
            ctx.save();
            if (tr.type === 'light') {
                ctx.shadowBlur = 25;
                ctx.shadowColor = "#00ffff";
                ctx.fillStyle = "#fff";
            } else {
                // Setsu: Círculo negro con un anillo de luz blanca interna muy fino para que "exista"
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ffffff";
                ctx.fillStyle = "#000";
                ctx.strokeStyle = "rgba(255,255,255,0.5)";
                ctx.lineWidth = 2;
            }
            
            ctx.beginPath();
            ctx.arc(x, y, 7, 0, Math.PI * 2);
            ctx.fill();
            if (tr.type === 'dark') ctx.stroke();
            ctx.restore();
        });
    } else if (progress >= 0.5) {
        // Lógica de la espada y explosión (simplificada para elegancia)
        if (expParticles.length === 0) {
            tracers = [];
            for (let i = 0; i < 80; i++) {
                const ang = Math.random() * 6.28;
                expParticles.push({ x: centerX, y: centerY, vx: Math.cos(ang) * 15, vy: Math.sin(ang) * 15, alpha: 1 });
            }
            sword.active = true;
        }

        expParticles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.alpha *= 0.96;
            ctx.fillStyle = `rgba(0, 255, 255, ${p.alpha})`;
            ctx.fillRect(p.x, p.y, 2, 2);
        });

        if (sword.active && !sword.landed) {
            sword.y = centerY + 180;
            sword.landed = true;
            logoContainer.style.visibility = 'visible';
            logoContainer.style.opacity = '1';
            document.getElementById('logo-text').classList.add('glitch');
        }
    }

    time += 16;
    if (progress < 1.5) requestAnimationFrame(draw);
}

init();
draw();
setTimeout(() => window.location.replace("index1.html"), 12000);
</script>
</body>
</html>
