<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Infinite Art Games - Perfect Balance</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }
        #logo-container {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; visibility: hidden;
            pointer-events: none; z-index: 10; width: 95%;
        }
        #logo-text {
            color: #fff; font-size: 5vw; letter-spacing: 2vw;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            margin: 0; white-space: nowrap;
        }
        .glitch { animation: glitch-anim 0.2s linear infinite; }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); color: #0ff; }
            40% { transform: translate(3px, -2px); color: #fff; }
            60% { transform: translate(-3px, -2px); }
            100% { transform: translate(0); }
        }
        @media (max-width: 480px) { #logo-text { font-size: 8vw; letter-spacing: 1.5vw; } }
    </style>
</head>
<link rel="icon" type="image/x-icon" href="favicon.ico">
    
<body>
    <div id="logo-container"><h1 id="logo-text">INFINITE ART GAMES</h1></div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const logoContainer = document.getElementById('logo-container');
const logoText = document.getElementById('logo-text');

let w, h, centerX, centerY, isMobile;
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    centerX = w / 2;
    centerY = h / 2;
    isMobile = w < 768;
}
window.addEventListener('resize', () => { resize(); init(); });
resize();

let time = 0;
const duration = 8500; 
let infParticles = [], tracers = [], expParticles = [], ambientParticles = [], embers = []; 
let sword = { y: -1000, v: 0, active: false, landed: false, shockwave: 0, shake: 0 };

function init() {
    infParticles = []; ambientParticles = []; tracers = []; embers = [];
    
    const countAmbient = isMobile ? 30 : 60;
    for (let j = 0; j < countAmbient; j++) {
        const radius = 100 + Math.random() * (isMobile ? 200 : 400);
        const ang = Math.random() * 6.28;
        ambientParticles.push({
            x: centerX + Math.cos(ang) * radius, y: centerY + Math.sin(ang) * radius,
            v: 0.1 + Math.random() * 0.4, r: Math.random() * 1.5 + 0.5, a: 0.1 + Math.random() * 0.4
        });
    }

    for (let i = 0; i < 90; i++) {
        const t = (i / 90) * Math.PI * 2;
        infParticles.push({
            t, r: Math.random() * 4 + 2,
            speed: 0.005 + Math.random() * 0.002, 
            orbitAng: Math.random() * 6.28, 
            orbitRadius: 6 + Math.random() * 14, 
            pulse: Math.random() * Math.PI * 2
        });
    }

    // TRACERS DUALES (Modificados para visibilidad)
    tracers = [];
    tracers.push({ t: 0, speed: 0.07, dir: 1, history: [], color: '#fff', glow: '#00ffff', type: 'light' });
    tracers.push({ t: Math.PI, speed: 0.07, dir: -1, history: [], color: '#000', glow: '#666', type: 'dark' });
}

function getLemniscata(t, scale) {
    const d = Math.pow(Math.sin(t), 2) + 1;
    return { x: (scale * Math.cos(t)) / d, y: (scale * Math.sin(t) * Math.cos(t)) / d };
}

function drawSword(y) {
    ctx.save();
    ctx.translate(centerX, y);
    const sSword = isMobile ? 1.4 : 2.2; 
    ctx.scale(sSword, sSword);
    ctx.shadowBlur = 30; ctx.shadowColor = "#00ffff";
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.moveTo(0, 0); 
    ctx.lineTo(-14, -25); ctx.lineTo(-14, -135); ctx.lineTo(0, -150); 
    ctx.lineTo(14, -135); ctx.lineTo(14, -25);
    ctx.fill();
    ctx.shadowBlur = 0; 
    ctx.fillStyle = "#00ffff";
    ctx.beginPath();
    ctx.moveTo(-35, -135); ctx.lineTo(-35, -145); ctx.lineTo(-10, -145); ctx.lineTo(-10, -155); 
    ctx.lineTo(10, -155); ctx.lineTo(10, -145); ctx.lineTo(35, -145); ctx.lineTo(35, -135);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.fillRect(-6, -180, 12, 25);
    ctx.beginPath();
    ctx.moveTo(-10, -180); ctx.lineTo(-10, -190); ctx.lineTo(0, -200); ctx.lineTo(10, -190); ctx.lineTo(10, -180);
    ctx.fill();
    ctx.restore();
}

function draw() {
    let shakeX = (Math.random() - 0.5) * sword.shake;
    let shakeY = (Math.random() - 0.5) * sword.shake;
    if (sword.shake > 0) sword.shake *= 0.88; 

    ctx.save();
    ctx.translate(shakeX, shakeY);
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.35)'; 
    ctx.fillRect(-100, -100, w + 200, h + 200);

    const progress = time / duration;
    const scaleInf = isMobile ? Math.min(w, h) * 0.35 : Math.min(w, h) * 0.38;

    if (progress < 0.42) {
        // AMBIENTALES (Restauradas)
        ctx.globalCompositeOperation = 'source-over';
        ambientParticles.forEach(ap => {
            const dx = ap.x - centerX, dy = ap.y - centerY;
            ap.x = centerX + Math.cos(Math.atan2(dy, dx) + ap.v * 0.005) * Math.hypot(dx, dy);
            ap.y = centerY + Math.sin(Math.atan2(dy, dx) + ap.v * 0.005) * Math.hypot(dx, dy);
            ctx.fillStyle = `rgba(0, 255, 255, ${ap.a})`;
            ctx.beginPath(); ctx.arc(ap.x, ap.y, ap.r, 0, 6.28); ctx.fill();
        });

        // INFINITO (Restaurado)
        ctx.globalCompositeOperation = 'lighter';
        infParticles.forEach(p => {
            p.t += p.speed; p.pulse += 0.08;
            const pos = getLemniscata(p.t, scaleInf);
            
            // EFECTO "VÓRTICE": Las partículas reaccionan a los tracers
            let offsetX = 0, offsetY = 0;
            tracers.forEach(tr => {
                const tPos = getLemniscata(tr.t, scaleInf);
                const dist = Math.hypot(pos.x - tPos.x, pos.y - tPos.y);
                if (dist < 60) {
                    const factor = (60 - dist) / 60;
                    if (tr.type === 'dark') { // Setsu absorbe
                        offsetX += (tPos.x - pos.x) * factor * 0.5;
                        offsetY += (tPos.y - pos.y) * factor * 0.5;
                    } else { // Sét-su organiza/brilla
                        p.pulse += 0.2;
                    }
                }
            });

            const x = centerX + pos.x + offsetX + Math.cos(p.orbitAng + time*0.002) * p.orbitRadius;
            const y = centerY + pos.y + offsetY + Math.sin(p.orbitAng + time*0.002) * p.orbitRadius;
            const currentR = p.r + Math.sin(p.pulse) * 1.5;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(x, y, currentR * 0.4, 0, 6.28); ctx.fill();
            ctx.fillStyle = 'rgba(0, 255, 255, 0.4)';
            ctx.beginPath(); ctx.arc(x, y, currentR * 1.8, 0, 6.28); ctx.fill();
        });

        // TRACERS (Modificados para ser Blanco y Negro visibles)
        ctx.globalCompositeOperation = 'source-over';
        tracers.forEach(tr => {
            tr.t += tr.speed * tr.dir;
            const pos = getLemniscata(tr.t, scaleInf);
            const x = centerX + pos.x, y = centerY + pos.y;
            tr.history.push({x, y});
            if (tr.history.length > 20) tr.history.shift();
            
            // Estela/Humo
            ctx.lineWidth = 4;
            tr.history.forEach((h, idx) => {
                const alpha = (idx / tr.history.length);
                ctx.strokeStyle = tr.type === 'light' ? `rgba(255, 255, 255, ${alpha * 0.5})` : `rgba(100, 100, 100, ${alpha * 0.3})`;
                ctx.beginPath();
                if (idx === 0) ctx.moveTo(h.x, h.y); else ctx.lineTo(h.x, h.y);
                ctx.stroke();
            });

            // Núcleo
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = tr.glow;
            ctx.fillStyle = tr.color;
            if(tr.type === 'dark') {
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; // Borde para visibilidad
                ctx.beginPath(); ctx.arc(x, y, 6, 0, 6.28); ctx.fill(); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(x, y, 6, 0, 6.28); ctx.fill();
            }
            ctx.restore();
        });
    } 
    else if (progress < 0.5) {
        const s = 1 - (progress - 0.42) * 12.5;
        ctx.fillStyle = '#fff';
        infParticles.forEach(p => {
            const pos = getLemniscata(p.t, scaleInf * s);
            ctx.beginPath(); ctx.arc(centerX + pos.x, centerY + pos.y, 2.5, 0, 6.28); ctx.fill();
        });
    } 
    else {
        // EXPLOSIÓN Y ESPADA (Restaurado)
        if (expParticles.length === 0) {
            infParticles = []; ambientParticles = []; tracers = [];
            for (let i = 0; i < 150; i++) {
                const ang = Math.random() * 6.28, spd = Math.random() * (isMobile ? 35 : 65) + 20;
                expParticles.push({ x: centerX, y: centerY, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, l: 1 });
            }
            sword.active = true;
        }

        ctx.globalCompositeOperation = 'lighter';
        expParticles.forEach(p => {
            const ox = p.x, oy = p.y;
            p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.l -= 0.015;
            if (p.l > 0) {
                ctx.strokeStyle = `rgba(0, 255, 255, ${p.l})`; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(p.x, p.y); ctx.stroke();
            }
        });

        if (sword.active) {
            const groundY = centerY + (isMobile ? h*0.2 : 180);
            if (!sword.landed) {
                sword.v += 4.5; sword.y += sword.v;
                if (sword.y >= groundY) {
                    sword.y = groundY; sword.landed = true; 
                    sword.shockwave = 1; sword.shake = 45;
                    logoContainer.style.visibility = 'visible';
                    logoContainer.style.opacity = '1';
                    logoText.classList.add('glitch'); 
                    setTimeout(() => logoText.classList.remove('glitch'), 600);
                }
            }
            drawSword(sword.y);
            
            if (sword.landed) {
                if (embers.length < 50) {
                    const sideSpread = (Math.random() - 0.5) * (isMobile ? 100 : 160);
                    embers.push({ 
                        baseX: centerX + sideSpread, 
                        y: groundY, 
                        vx: sideSpread * 0.02,
                        vy: -Math.random() * 4 - 2, 
                        rBase: Math.random() * 5 + 3, 
                        angSeed: Math.random() * 20,
                        l: 1 
                    });
                }
                embers.forEach((eb, idx) => {
                    eb.baseX += eb.vx; eb.y += eb.vy; eb.angSeed += 0.04; eb.l -= 0.006;
                    if (eb.l <= 0) { embers.splice(idx, 1); return; }
                    const offset = Math.sin(time*0.01 + eb.angSeed) * 35 * (1-eb.l); 
                    const curX = eb.baseX + offset;
                    ctx.fillStyle = `rgba(0, 255, 255, ${eb.l * 0.9})`;
                    const curR = (eb.rBase + Math.sin(time*0.02 + eb.angSeed)*2) * eb.l;
                    ctx.beginPath(); ctx.arc(curX, eb.y, curR, 0, 6.28); ctx.fill();
                });
            }

            if (sword.shockwave > 0) {
                sword.shockwave += 35; 
                const alpha = 1 - (sword.shockwave / (isMobile ? 450 : 850));
                if (alpha > 0) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.ellipse(centerX, groundY, sword.shockwave, sword.shockwave/6, 0, 0, 6.28); ctx.stroke();
                }
            }
        }
    }
    ctx.restore();
    time += 16;
    if (progress < 1.4) requestAnimationFrame(draw);
}

init();
draw();

setTimeout(() => {
    window.location.replace("index1.html");
}, 12000);

</script>
</body>
</html>
