<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Infinite Art Games - Sword Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }
        #logo-container {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; visibility: hidden;
            transition: opacity 0.8s ease-out; pointer-events: none; z-index: 10;
            width: 100%;
        }
        #logo-text {
            color: #fff; font-size: 4.5rem; letter-spacing: 12px;
            text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
            margin: 0; white-space: nowrap;
        }
        @media (max-width: 768px) { #logo-text { font-size: 2rem; letter-spacing: 5px; } }
    </style>
</head>
<body>
    <div id="logo-container"><h1 id="logo-text">INFINITE ART GAMES</h1></div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const logoContainer = document.getElementById('logo-container');

let w, h, centerX, centerY;
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    centerX = w / 2;
    centerY = h / 2;
}
window.addEventListener('resize', resize);
resize();

let time = 0;
const duration = 7500; 
let infParticles = [];
let expParticles = [];
let sword = { y: -200, v: 0, active: false, landed: false, sparks: [] };

function init() {
    for (let i = 0; i < 180; i++) {
        const t = (i / 180) * Math.PI * 2;
        infParticles.push({
            t, speed: 0.003 + Math.random() * 0.004,
            r: Math.random() * 2 + 1.5,
            seed: Math.random() * 100,
            orbitAng: Math.random() * Math.PI * 2,
            orbitSpeed: 0.05 + Math.random() * 0.1,
            orbitRadius: 5 + Math.random() * 10 
        });
    }
}

function getLemniscataPoint(t, scale) {
    const den = Math.pow(Math.sin(t), 2) + 1;
    return { x: (scale * Math.cos(t)) / den, y: (scale * Math.sin(t) * Math.cos(t)) / den };
}

function drawSword(y) {
    ctx.save();
    ctx.translate(centerX, y);
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#00ffff";
    
    // Hoja de la espada
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.moveTo(0, 0); // Punta
    ctx.lineTo(-8, -100);
    ctx.lineTo(8, -100);
    ctx.fill();
    
    // Guarda (la cruz)
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(-25, -105, 50, 8);
    
    // Mango
    ctx.fillStyle = "#fff";
    ctx.fillRect(-4, -135, 8, 30);
    
    // Pomo (final del mango)
    ctx.beginPath();
    ctx.arc(0, -140, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
}

function draw() {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; 
    ctx.fillRect(0, 0, w, h);

    const progress = time / duration;

    if (progress < 0.5) {
        // --- FASE 1: INFINITO ATÓMICO ---
        ctx.globalCompositeOperation = 'lighter';
        const scale = Math.min(w, h) * 0.35;
        infParticles.forEach(p => {
            p.t += p.speed;
            p.orbitAng += p.orbitSpeed;
            const pos = getLemniscataPoint(p.t, scale);
            const x = centerX + pos.x + Math.cos(p.orbitAng)*p.orbitRadius;
            const y = centerY + pos.y + Math.sin(p.orbitAng)*p.orbitRadius;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(x, y, p.r*0.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(0, 255, 255, 0.4)';
            ctx.beginPath(); ctx.arc(x, y, p.r*1.5, 0, Math.PI*2); ctx.fill();
        });
    } 
    else if (progress < 0.6) {
        // --- FASE 2: CONTRACCIÓN ---
        const s = 1 - (progress - 0.5) * 10;
        ctx.fillStyle = '#fff';
        infParticles.forEach(p => {
            const pos = getLemniscataPoint(p.t, Math.min(w, h) * 0.35 * s);
            ctx.beginPath(); ctx.arc(centerX + pos.x, centerY + pos.y, 3, 0, Math.PI*2); ctx.fill();
        });
    } 
    else {
        // --- FASE 3: EXPLOSIÓN + ESPADA ---
        if (expParticles.length === 0) {
            for (let i = 0; i < 500; i++) {
                const ang = Math.random() * Math.PI * 2;
                const spd = Math.random() * 25 + 5;
                expParticles.push({ x: centerX, y: centerY, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, life: 1, decay: 0.015 });
            }
            logoContainer.style.visibility = 'visible';
            logoContainer.style.opacity = '1';
            sword.active = true;
        }

        ctx.globalCompositeOperation = 'lighter';
        expParticles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.life -= p.decay;
            if (p.life > 0) {
                ctx.strokeStyle = `rgba(0, 255, 255, ${p.life})`;
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx*1.5, p.y - p.vy*1.5); ctx.stroke();
            }
        });

        // Animación de la Espada Gamer
        if (sword.active) {
            const targetY = centerY + 120; // Se clava debajo del texto
            if (!sword.landed) {
                sword.v += 1.5; // Gravedad
                sword.y += sword.v;
                if (sword.y >= targetY) {
                    sword.y = targetY;
                    sword.landed = true;
                    // Chispas de impacto
                    for(let i=0; i<20; i++) {
                        sword.sparks.push({ 
                            x: centerX, y: targetY, 
                            vx: (Math.random()-0.5)*15, vy: -Math.random()*10, 
                            l: 1 
                        });
                    }
                }
            }
            drawSword(sword.y);
            
            // Dibujar chispas de impacto
            sword.sparks.forEach(s => {
                s.x += s.vx; s.y += s.vy; s.vy += 0.5; s.l -= 0.02;
                if (s.l > 0) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.l})`;
                    ctx.fillRect(s.x, s.y, 2, 2);
                }
            });
        }
    }

    time += 16;
    if (progress < 1.5) requestAnimationFrame(draw);
}

init();
draw();
    
  // Espera a que termine la animación del intro (7.5 segundos + margen)
  setTimeout(() => {
    window.location.replace("index2.html");
  }, 8200);
</script>
</body>
</html>
