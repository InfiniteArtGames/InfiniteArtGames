<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Infinite Art Games - Impacto Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }
        #logo-container {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease; pointer-events: none; z-index: 10; width: 100%;
        }
        #logo-text {
            color: #fff; font-size: 5rem; letter-spacing: 18px;
            text-shadow: 0 0 25px #00ffff; margin: 0; white-space: nowrap;
        }
        @media (max-width: 768px) { #logo-text { font-size: 2.2rem; letter-spacing: 6px; } }
    </style>
</head>
<body>
    <div id="logo-container"><h1 id="logo-text">INFINITE ART GAMES</h1></div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const logoContainer = document.getElementById('logo-container');

let w, h, centerX, centerY;
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    centerX = w / 2;
    centerY = h / 2;
}
window.addEventListener('resize', resize);
resize();

let time = 0;
const duration = 8000; 
let infParticles = [];
let expParticles = [];
let sword = { y: -500, v: 0, active: false, landed: false, shockwave: 0 };

function init() {
    for (let i = 0; i < 110; i++) {
        const t = (i / 110) * Math.PI * 2;
        infParticles.push({
            t, baseR: Math.random() * 3 + 1.5,
            speed: 0.005, phase: Math.random() * 6.28,
            orbitAng: Math.random() * 6.28, orbitRadius: 8 + Math.random() * 12 
        });
    }
}

function getLemniscata(t, scale) {
    const d = Math.pow(Math.sin(t), 2) + 1;
    return { x: (scale * Math.cos(t)) / d, y: (scale * Math.sin(t) * Math.cos(t)) / d };
}

function drawSword(y) {
    ctx.save();
    ctx.translate(centerX, y);
    ctx.shadowBlur = 20; ctx.shadowColor = "#00ffff";
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(-15, -140); ctx.lineTo(15, -140); ctx.fill();
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(-38, -145, 76, 12);
    ctx.fillStyle = "#fff";
    ctx.fillRect(-8, -175, 16, 30);
    ctx.restore();
}

function draw() {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; // Rastro sutil para motion blur
    ctx.fillRect(0, 0, w, h);

    const progress = time / duration;

    // FASE 1: INFINITO (0% - 42%)
    if (progress < 0.42) {
        ctx.globalCompositeOperation = 'lighter';
        const scale = Math.min(w, h) * 0.36;
        
        infParticles.forEach(p => {
            p.t += p.speed; p.phase += 0.06;
            const pos = getLemniscata(p.t, scale);
            const x = centerX + pos.x + Math.cos(p.orbitAng + time*0.002) * p.orbitRadius;
            const y = centerY + pos.y + Math.sin(p.orbitAng + time*0.002) * p.orbitRadius;
            const pulse = p.baseR + Math.sin(p.phase) * 1.5;
            
            ctx.fillStyle = 'rgba(0, 255, 255, 0.7)';
            ctx.beginPath(); ctx.arc(x, y, pulse, 0, 6.28); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(x, y, pulse * 0.4, 0, 6.28); ctx.fill();
        });
    } 
    // FASE 2: IMPLOSIÓN (42% - 50%)
    else if (progress < 0.5) {
        const s = 1 - (progress - 0.42) * 12.5; // Contracción más rápida
        ctx.fillStyle = '#fff';
        infParticles.forEach(p => {
            const pos = getLemniscata(p.t, Math.min(w, h) * 0.36 * s);
            ctx.beginPath(); ctx.arc(centerX + pos.x, centerY + pos.y, 2.5, 0, 6.28); ctx.fill();
        });
    } 
    // FASE 3: BIG BANG DE PANTALLA COMPLETA (50% en adelante)
    else {
        if (expParticles.length === 0) {
            for (let i = 0; i < 160; i++) { // Solo 160 partículas, pero LARGAS
                const ang = Math.random() * 6.28;
                const spd = Math.random() * 60 + 20; // VELOCIDAD MULTIPLICADA X4
                expParticles.push({ x: centerX, y: centerY, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, l: 1 });
            }
            logoContainer.style.visibility = 'visible';
            logoContainer.style.opacity = '1';
            sword.active = true;
        }

        ctx.globalCompositeOperation = 'lighter'; // Glow por superposición
        expParticles.forEach(p => {
            p.x += p.vx; p.y += p.vy; // Movimiento lineal puro = Rápido
            p.l -= 0.02; // Vida decreciente

            if (p.l > 0) {
                ctx.strokeStyle = `rgba(0, 255, 255, ${p.l})`;
                ctx.lineWidth = 4; // Línea gruesa
                ctx.lineCap = 'round';
                
                ctx.beginPath(); 
                ctx.moveTo(p.x, p.y);
                // La estela es larga, proporcional a la velocidad
                ctx.lineTo(p.x - p.vx * 1.5, p.y - p.vy * 1.5); 
                ctx.stroke();
            }
        });

        if (sword.active) {
            const groundY = centerY + 150;
            if (!sword.landed) {
                sword.v += 3.5; // Caída más rápida y pesada
                sword.y += sword.v;
                if (sword.y >= groundY) {
                    sword.y = groundY;
                    sword.landed = true;
                    sword.shockwave = 1; 
                }
            }
            drawSword(sword.y);

            if (sword.shockwave > 0) {
                sword.shockwave += 30; // Onda de choque más rápida
                const alpha = 1 - (sword.shockwave / 600);
                if (alpha > 0) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.ellipse(centerX, groundY, sword.shockwave, sword.shockwave/5, 0, 0, 6.28);
                    ctx.stroke();
                }
            }
        }
    }

    time += 16;
    if (progress < 1.1) requestAnimationFrame(draw);
}

init();
draw();
</script>
</body>
</html>
