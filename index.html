<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Infinite Art Games - Perfect Balance</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }
        #logo-container {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; visibility: hidden;
            pointer-events: none; z-index: 10; width: 95%;
        }
        #logo-text {
            color: #fff; font-size: 5vw; letter-spacing: 2vw;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            margin: 0; white-space: nowrap;
        }
        .glitch { animation: glitch-anim 0.2s linear infinite; }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); color: #0ff; }
            40% { transform: translate(3px, -2px); color: #fff; }
            60% { transform: translate(-3px, -2px); }
            100% { transform: translate(0); }
        }
        @media (max-width: 480px) { #logo-text { font-size: 8vw; letter-spacing: 1.5vw; } }
    </style>
</head>
<link rel="icon" type="image/x-icon" href="favicon.ico">
    
<body>
    <div id="logo-container"><h1 id="logo-text">INFINITE ART GAMES</h1></div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const logoContainer = document.getElementById('logo-container');
const logoText = document.getElementById('logo-text');

let w, h, centerX, centerY, isMobile;
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    centerX = w / 2;
    centerY = h / 2;
    isMobile = w < 768;
}
window.addEventListener('resize', () => { resize(); init(); });
resize();

let time = 0;
// EXTENSIÓN DE TIEMPO: De 8500 a 11500 (+3 segundos totales)
const duration = 9000; 
let infParticles = [], tracers = [], expParticles = [], ambientParticles = [], embers = []; 
let sword = { y: -1000, v: 0, active: false, landed: false, shockwaves: [], shake: 0 };

function init() {
    infParticles = []; ambientParticles = []; tracers = []; embers = [];
    
    const countAmbient = isMobile ? 40 : 80;
    for (let j = 0; j < countAmbient; j++) {
        const radius = 100 + Math.random() * (isMobile ? 200 : 450);
        const ang = Math.random() * 6.28;
        ambientParticles.push({
            x: centerX + Math.cos(ang) * radius, y: centerY + Math.sin(ang) * radius,
            v: 0.1 + Math.random() * 0.4, r: Math.random() * 1.5 + 0.5, a: 0.1 + Math.random() * 0.4,
            vx: 0, vy: 0 
        });
    }

    for (let i = 0; i < 100; i++) {
        const t = (i / 100) * Math.PI * 2;
        infParticles.push({
            t, r: Math.random() * 4 + 2,
            speed: 0.005 + Math.random() * 0.002, 
            orbitAng: Math.random() * 6.28, 
            orbitRadius: 6 + Math.random() * 14, 
            pulse: Math.random() * Math.PI * 2,
            curX: 0, curY: 0, vx: 0, vy: 0 
        });
    }

    tracers = [];
    tracers.push({ t: 0, speed: 0.07, dir: 1, history: [], color: '#fff', glow: '#fff', type: 'light' });
    tracers.push({ t: Math.PI, speed: 0.07, dir: -1, history: [], color: '#000', glow: '#ffffff', type: 'dark' });
}

function getLemniscata(t, scale) {
    const d = Math.pow(Math.sin(t), 2) + 1;
    return { x: (scale * Math.cos(t)) / d, y: (scale * Math.sin(t) * Math.cos(t)) / d };
}

function drawSword(y) {
    ctx.save();
    ctx.translate(centerX, y);
    const sSword = isMobile ? 1.4 : 2.2; 
    ctx.scale(sSword, sSword);
    ctx.shadowBlur = 40; ctx.shadowColor = "#00ffff";
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(-14, -25); ctx.lineTo(-14, -135); ctx.lineTo(0, -150); ctx.lineTo(14, -135); ctx.lineTo(14, -25); ctx.fill();
    ctx.shadowBlur = 0; 
    ctx.fillStyle = "#00ffff";
    ctx.beginPath();
    ctx.moveTo(-35, -135); ctx.lineTo(-35, -145); ctx.lineTo(-10, -145); ctx.lineTo(-10, -155); 
    ctx.lineTo(10, -155); ctx.lineTo(10, -145); ctx.lineTo(35, -145); ctx.lineTo(35, -135); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.fillRect(-6, -180, 12, 25);
    ctx.beginPath();
    ctx.moveTo(-10, -180); ctx.lineTo(-10, -190); ctx.lineTo(0, -200); ctx.lineTo(10, -190); ctx.lineTo(10, -180); ctx.fill();
    ctx.restore();
}

function draw() {
    let shakeX = (Math.random() - 0.5) * sword.shake;
    let shakeY = (Math.random() - 0.5) * sword.shake;
    if (sword.shake > 0) sword.shake *= 0.88; 

    ctx.save();
    ctx.translate(shakeX, shakeY);
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; 
    ctx.fillRect(-100, -100, w + 200, h + 200);

    const progress = time / duration;
    const scaleInf = isMobile ? Math.min(w, h) * 0.35 : Math.min(w, h) * 0.38;

    // FASE 1: Símbolo del Infinito (Ajustada para durar más proporción del tiempo)
    if (progress < 0.55) { 
        ctx.globalCompositeOperation = 'source-over';
        ambientParticles.forEach(ap => {
            const dx = ap.x - centerX, dy = ap.y - centerY;
            const dist = Math.hypot(dx, dy);
            const ang = Math.atan2(dy, dx) + ap.v * 0.005;
            ap.x = centerX + Math.cos(ang) * dist + ap.vx;
            ap.y = centerY + Math.sin(ang) * dist + ap.vy;
            ap.vx *= 0.94; ap.vy *= 0.94;
            ctx.fillStyle = `rgba(0, 255, 255, ${ap.a})`;
            ctx.beginPath(); ctx.arc(ap.x, ap.y, ap.r, 0, 6.28); ctx.fill();
        });

        ctx.globalCompositeOperation = 'lighter';
        infParticles.forEach(p => {
            p.t += p.speed; p.pulse += 0.08;
            const targetPos = getLemniscata(p.t, scaleInf);

            tracers.forEach(tr => {
                const trPos = getLemniscata(tr.t, scaleInf);
                const dist = Math.hypot(p.curX - trPos.x, p.curY - trPos.y);
                if (dist < 85) {
                    const power = (85 - dist) * 0.25;
                    if (tr.type === 'dark') { 
                        p.vx += (p.curX - trPos.x) * (power * 0.05);
                        p.vy += (p.curY - trPos.y) * (power * 0.05);
                    } else { 
                        p.vx += (targetPos.x - p.curX) * (power * 0.08);
                        p.vy += (targetPos.y - p.curY) * (power * 0.08);
                    }
                }
            });

            p.vx += (targetPos.x - p.curX) * 0.015;
            p.vy += (targetPos.y - p.curY) * 0.015;
            p.vx *= 0.92; p.vy *= 0.92;
            p.curX += p.vx; p.curY += p.vy;

            const x = centerX + p.curX + Math.cos(p.orbitAng + time*0.002) * p.orbitRadius;
            const y = centerY + p.curY + Math.sin(p.orbitAng + time*0.002) * p.orbitRadius;
            const currentR = p.r + Math.sin(p.pulse) * 1.5;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(x, y, currentR * 0.4, 0, 6.28); ctx.fill();
            ctx.fillStyle = 'rgba(0, 255, 255, 0.5)';
            ctx.beginPath(); ctx.arc(x, y, currentR * 2, 0, 6.28); ctx.fill();
        });

        ctx.globalCompositeOperation = 'source-over';
        tracers.forEach(tr => {
            tr.t += tr.speed * tr.dir;
            const pos = getLemniscata(tr.t, scaleInf);
            const x = centerX + pos.x, y = centerY + pos.y;
            tr.history.push({x, y});
            if (tr.history.length > 35) tr.history.shift();
            
            tr.history.forEach((h, idx) => {
                const p = idx / tr.history.length;
                ctx.save();
                if (tr.type === 'light') {
                    ctx.lineWidth = 2 + (p * 12);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${p * 0.7})`;
                    ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
                } else {
                    ctx.lineWidth = 4 + (p * 18);
                    ctx.strokeStyle = `rgba(200, 200, 200, ${p * 0.3})`;
                }
                ctx.beginPath();
                const nextH = tr.history[idx + 1] || {x: x, y: y};
                ctx.moveTo(h.x, h.y); ctx.lineTo(nextH.x, nextH.y);
                ctx.stroke();
                ctx.restore();
            });

            ctx.save();
            ctx.shadowBlur = 25; ctx.shadowColor = tr.glow; ctx.fillStyle = tr.color;
            ctx.beginPath(); ctx.arc(x, y, 8, 0, 6.28); ctx.fill();
            if (tr.type === 'dark') {
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            }
            ctx.restore();
        });
    } 
    // FASE 2: Transición (Contraer)
    else if (progress < 0.62) {
        const s = 1 - (progress - 0.55) * 14.2;
        ctx.fillStyle = '#fff';
        infParticles.forEach(p => {
            const pos = getLemniscata(p.t, scaleInf * s);
            ctx.beginPath(); ctx.arc(centerX + pos.x, centerY + pos.y, 3, 0, 6.28); ctx.fill();
        });
    } 
    // FASE 3: Espada e Impacto
    else {
        if (expParticles.length === 0) {
            infParticles = []; tracers = [];
            for (let i = 0; i < 180; i++) {
                const ang = Math.random() * 6.28, spd = Math.random() * 45 + 25;
                expParticles.push({ x: centerX, y: centerY, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, l: 1 });
            }
            sword.active = true;
        }

        ctx.globalCompositeOperation = 'lighter';
        expParticles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.l -= 0.012;
            if (p.l > 0) {
                ctx.strokeStyle = `rgba(0, 255, 255, ${p.l})`; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x-p.vx*1.5, p.y-p.vy*1.5); ctx.stroke();
            }
        });

        if (sword.active) {
            const groundY = centerY + (isMobile ? h*0.2 : 180);
            if (!sword.landed) {
                sword.v += 5; sword.y += sword.v;
                if (sword.y >= groundY) {
                    sword.y = groundY; sword.landed = true; 
                    sword.shake = 60;
                    
                    sword.shockwaves = [
                        { r: 1, speed: 45, alpha: 1, width: 5 },
                        { r: -100, speed: 38, alpha: 1, width: 3 }, 
                        { r: -200, speed: 30, alpha: 1, width: 2 } 
                    ];

                    logoContainer.style.visibility = 'visible';
                    logoContainer.style.opacity = '1';
                    logoText.classList.add('glitch'); 
                    
                    ambientParticles.forEach(ap => {
                        const dx = ap.x - centerX, dy = ap.y - groundY;
                        const dist = Math.hypot(dx, dy);
                        const force = (1200 - dist) * 0.12;
                        if (force > 0) {
                            ap.vx = (dx / dist) * force;
                            ap.vy = (dy / dist) * force;
                        }
                    });
                    setTimeout(() => logoText.classList.remove('glitch'), 800);
                }
            }
            drawSword(sword.y);
            
            if (sword.landed) {
                if (embers.length < 60) {
                    const sideSpread = (Math.random() - 0.5) * (isMobile ? 120 : 180);
                    embers.push({ baseX: centerX + sideSpread, y: groundY, vx: sideSpread * 0.02, vy: -Math.random() * 5 - 3, rBase: Math.random() * 6 + 3, angSeed: Math.random() * 20, l: 1 });
                }
                embers.forEach((eb, idx) => {
                    eb.baseX += eb.vx; eb.y += eb.vy; eb.angSeed += 0.04; eb.l -= 0.005;
                    if (eb.l <= 0) { embers.splice(idx, 1); return; }
                    const offset = Math.sin(time*0.01 + eb.angSeed) * 45 * (1-eb.l); 
                    const curX = eb.baseX + offset;
                    ctx.fillStyle = `rgba(0, 255, 255, ${eb.l * 0.9})`;
                    const curR = (eb.rBase + Math.sin(time*0.02 + eb.angSeed)*2.5) * eb.l;
                    ctx.beginPath(); ctx.arc(curX, eb.y, curR, 0, 6.28); ctx.fill();
                });

                sword.shockwaves.forEach((sw, idx) => {
                    if (sw.alpha > 0) {
                        sw.r += sw.speed;
                        sw.alpha = 1 - (sw.r / (isMobile ? 500 : 950));
                        
                        if (sw.r > 0 && sw.alpha > 0) {
                            ctx.save();
                            ctx.strokeStyle = `rgba(255, 255, 255, ${sw.alpha})`;
                            ctx.lineWidth = sw.width;
                            ctx.beginPath();
                            ctx.ellipse(centerX, groundY, sw.r, sw.r/6, 0, 0, 6.28);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }
                });
            }
        }
    }
    ctx.restore();
    time += 16;
    if (progress < 1.4) requestAnimationFrame(draw);
}

init();
draw();
// AJUSTE REDIRECCIÓN: De 12000 a 15000 para compensar el tiempo extra
setTimeout(() => window.location.replace("index1.html"), 20000);
</script>
</body>
</html>
