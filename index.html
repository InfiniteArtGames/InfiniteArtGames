<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arañitas∞ | Infinite Art Games</title>
    <style>
        :root {
            --primary: #a020f0;
            --accent: #00d4ff;
            --neon-ball: #39ff14;
        }
        body { 
            margin: 0; 
            background: #050010; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none; /* Evita el scroll del navegador al jugar */
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: var(--accent); 
            text-shadow: 0 0 10px var(--accent); 
            font-size: clamp(16px, 4vw, 24px); 
            pointer-events: none; 
            z-index: 5;
        }

        /* Botón de Pantalla Completa Interno */
        #fsBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(160, 32, 240, 0.3);
            color: white;
            border: 1px solid var(--primary);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            z-index: 10;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="ui">PUNTOS ∞: <span id="score">0</span></div>
    <button id="fsBtn" onclick="toggleFS()">Pantalla Completa ∞</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        const spiders = [];
        const mouse = { x: -100, y: -100 };

        // AJUSTE DINÁMICO DE PANTALLA [cite: 2025-07-23]
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Reposicionar arañas si es necesario para que no queden fuera tras girar
        }

        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 200));
        resize();

        // CONTROL DE PANTALLA COMPLETA REAL [cite: 2025-07-23]
        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {
                    alert("Error al activar pantalla completa: " + e.message);
                });
            } else {
                document.exitFullscreen();
            }
        }

        class Spider {
            constructor() { this.reset(); }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(canvas.width, canvas.height) * 0.8;
                this.x = canvas.width/2 + Math.cos(angle) * dist;
                this.y = canvas.height/2 + Math.sin(angle) * dist;
                this.speed = 1.5 + Math.random() * 2.5;
                this.size = canvas.width * 0.015 + 5; 
            }
            update() {
                const dx = canvas.width/2 - this.x;
                const dy = canvas.height/2 - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                this.x += (dx/dist) * this.speed;
                this.y += (dy/dist) * this.speed;

                // COLISIÓN TÁCTIL/MOUSE MEJORADA [cite: 2025-07-23]
                const mDx = mouse.x - this.x;
                const mDy = mouse.y - this.y;
                if(Math.sqrt(mDx*mDx + mDy*mDy) < this.size * 3) {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    this.reset();
                }

                if(dist < 20) { 
                    score = 0; 
                    document.getElementById('score').innerText = "ERROR ∞"; 
                    this.reset(); 
                }
            }
            draw() {
                ctx.strokeStyle = 'rgba(160, 32, 240, 0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(canvas.width/2, canvas.height/2);
                ctx.stroke();
                
                ctx.fillStyle = '#39ff14';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#39ff14';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Inicializar horda
        for(let i=0; i<12; i++) spiders.push(new Spider());

        // MANEJO DE CONTROLES TÁCTILES PRECISOS [cite: 2025-07-23]
        function updateMousePos(e) {
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const rect = canvas.getBoundingClientRect();
            mouse.x = clientX - rect.left;
            mouse.y = clientY - rect.top;
        }

        canvas.addEventListener('mousemove', updateMousePos);
        canvas.addEventListener('touchstart', (e) => { updateMousePos(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { updateMousePos(e); e.preventDefault(); }, {passive: false});

        function animate() {
            ctx.fillStyle = 'rgba(5, 0, 16, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Núcleo del Infinito (Centro)
            ctx.shadowBlur = 20; 
            ctx.shadowColor = '#a020f0';
            ctx.strokeStyle = '#a020f0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 20, 0, Math.PI*2);
            ctx.stroke();

            spiders.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
